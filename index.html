function monthKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function shiftMonth(key,n){const [y,m]=key.split('-').map(Number);return monthKey(new Date(y,m-1+n,1))}
function periodDate(key){return key+'-01'}
function monthLabel(key){const [y,m]=key.split('-');return `${MONTHS[Number(m)-1]} ${y}`}
function fmtMoney(v){return Number(v||0).toLocaleString('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0})}
function parseMoneyField(value){
  const raw=String(value??'').trim();
  if(!raw)return 0;
  const normalized=raw
    .replace(/\$/g,'')
    .replace(/\s/g,'')
    .replace(/\./g,'')
    .replace(',','.')
    .replace(/[^0-9.-]/g,'');
  const number=Number(normalized);
  return Number.isFinite(number)?number:0;
}
function formatMoneyField(value){
  if(value===null||value===undefined||value==='')return '';
  const number=typeof value==='number'?value:parseMoneyField(value);
  return Number(number||0).toLocaleString('es-AR',{
    minimumFractionDigits:Number.isInteger(number)?0:2,
    maximumFractionDigits:2
  });
}
function formatMoneyTyping(raw){
  const source=String(raw??'').replace(/\$/g,'').replace(/\s/g,'');
  if(!source)return '';

  const negative=source.startsWith('-');
  const withoutSign=source.replace(/-/g,'');
  const commaPosition=withoutSign.indexOf(',');
  const hasComma=commaPosition>=0;
  const integerRaw=(hasComma?withoutSign.slice(0,commaPosition):withoutSign)
    .replace(/\D/g,'');
  const decimals=hasComma
    ? withoutSign.slice(commaPosition+1).replace(/\D/g,'').slice(0,2)
    : '';

  const integerNumber=Number(integerRaw||0);
  const integerFormatted=integerNumber.toLocaleString('es-AR');
  return `${negative?'-':''}${integerFormatted}${hasComma?','+decimals:''}`;
}
function bindMoneyInputs(root=document){
  root.querySelectorAll('[data-money-input]').forEach(input=>{
    if(input.dataset.moneyBound==='true')return;
    input.dataset.moneyBound='true';
    input.type='text';
    input.inputMode='decimal';
    input.autocomplete='off';
    input.value=formatMoneyField(input.value);
    input.addEventListener('input',()=>{
      input.value=formatMoneyTyping(input.value);
    });
    input.addEventListener('blur',()=>{
      input.value=input.value?formatMoneyField(parseMoneyField(input.value)):'';
    });
  });
}
function urlBase64ToUint8Array(base64String){
  const padding='='.repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(base64);
  return Uint8Array.from([...raw].map(char=>char.charCodeAt(0)));
}
function isIOSDevice(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent)
    || (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
}
function isStandaloneApp(){
  return window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone===true;
}
function notificationSupported(){
  return 'serviceWorker' in navigator
    && 'PushManager' in window
    && 'Notification' in window;
}
async function registerServiceWorker(){
  if(!notificationSupported())return null;
  if(!serviceWorkerRegistrationPromise){
    serviceWorkerRegistrationPromise=navigator.serviceWorker
      .register('./service-worker.js?v=20260708-operator-v2',{scope:'./',updateViaCache:'none'})
      .then(async registration=>{
        try{await registration.update();}catch(error){console.warn('No se pudo forzar la actualización del service worker:',error);}
        await navigator.serviceWorker.ready;
        return registration;
      })
      .catch(error=>{
        serviceWorkerRegistrationPromise=null;
        throw error;
      });
  }
  return serviceWorkerRegistrationPromise;
}
async function currentPushSubscription(){
  const registration=await registerServiceWorker();
  if(!registration)return null;
  return registration.pushManager.getSubscription();
}
async function refreshNotificationState(){
  notificationState.supported=notificationSupported();
  notificationState.permission=notificationState.supported?Notification.permission:'unsupported';
  notificationState.ios=isIOSDevice();
  notificationState.standalone=isStandaloneApp();
  notificationState.error='';

  if(!notificationState.supported||!session||!group){
    notificationState.enabled=false;
    return notificationState;
  }

  try{
    const subscription=await currentPushSubscription();
    if(!subscription){
      notificationState.enabled=false;
      return notificationState;
    }

    const {data,error}=await sb.rpc('get_push_notification_status',{
      p_group_id:group.id,
      p_endpoint:subscription.endpoint
    });

    if(error)throw error;
    notificationState.enabled=data===true;
  }catch(error){
    console.error('Estado de notificaciones:',error);
    notificationState.enabled=false;
    notificationState.error=error?.message||'No se pudo consultar el estado';
  }

  return notificationState;
}
async function enableNotificationsForCurrentGroup(){
  if(!notificationSupported()){
    return toast('Este navegador no admite notificaciones web');
  }

  if(isIOSDevice()&&!isStandaloneApp()){
    return toast('En iPhone, abrí la app desde el ícono de la pantalla de inicio');
  }

  notificationState.loading=true;
  renderApp();

  try{
    const permission=await Notification.requestPermission();
    if(permission!=='granted'){
      throw new Error('El permiso de notificaciones no fue autorizado');
    }

    const registration=await registerServiceWorker();
    let subscription=await registration.pushManager.getSubscription();

    if(!subscription){
      subscription=await registration.pushManager.subscribe({
        userVisibleOnly:true,
        applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }

    const json=subscription.toJSON();
    const {error}=await sb.rpc('save_push_subscription',{
      p_group_id:group.id,
      p_endpoint:subscription.endpoint,
      p_p256dh:json.keys?.p256dh||'',
      p_auth:json.keys?.auth||'',
      p_user_agent:navigator.userAgent
    });

    if(error)throw error;

    notificationState.enabled=true;
    notificationState.permission='granted';
    toast('Notificaciones activadas');
  }catch(error){
    console.error('Activar notificaciones:',error);
    notificationState.error=error?.message||'No se pudieron activar';
    toast(notificationState.error);
  }finally{
    notificationState.loading=false;
    renderApp();
  }
}

async function readFunctionError(error){
  if(!error)return 'Error desconocido';
  try{
    if(error.context&&typeof error.context.json==='function'){
      const payload=await error.context.json();
      return payload?.error||payload?.message||error.message;
    }
  }catch(_){}
  return error.message||'No se pudo completar la operación';
}
function normalizeCategoryName(value){
  return String(value||'')
    .trim()
    .toLocaleLowerCase('es-AR')
    .replace(/\s+/g,' ');
}
function availableCategories(){
  const result=[];
  const seen=new Set();
  const add=value=>{
    const name=String(value||'').trim();
    const key=normalizeCategoryName(name);
    if(!name||seen.has(key))return;
    seen.add(key);
    result.push(name);
  };
  DEFAULT_CATEGORIES.forEach(add);
  serviceCategories.filter(category=>category.active!==false).forEach(category=>add(category.name));
  services.forEach(service=>add(service.category));
  return result;
}
async function createCustomCategory(name){
  const cleaned=String(name||'').trim();
  if(!cleaned)throw new Error('Ingresá el nombre de la categoría');

  const exists=availableCategories().some(category=>
    normalizeCategoryName(category)===normalizeCategoryName(cleaned)
  );
  if(exists)throw new Error('Ya existe una categoría con ese nombre');

  const {data,error}=await sb
    .from('service_categories')
    .insert({
      group_id:group.id,
      name:cleaned,
      created_by:session.user.id
    })
    .select()
    .single();

  if(error)throw error;
  serviceCategories.push(data);
  return cleaned;
}

  const {data,error}=await sb
    .from('internal_accounts')
    .select('user_id,alias,must_change_password,active')
    .eq('user_id',session.user.id)
    .maybeSingle();

  if(error){
    console.warn('No se pudo consultar el acceso interno:',error.message);
    return loadGroups();
  }

  if(data&&data.active===false){
    await sb.auth.signOut();
    return toast('Este acceso está bloqueado');

  if(data?.must_change_password){
    renderForcedPasswordChange(data.alias);
    return;
  }

  await loadGroups();
}

        <input id="loginPassword" type="password" autocomplete="current-password">

  }

      <small>Espacios privados e independientes</small>

function bindLogin(){
  const identity=document.getElementById('loginIdentity');
  const password=document.getElementById('loginPassword');
  const button=document.getElementById('authBtn');

  async function login(){
    const rawIdentity=identity.value.trim();
    const passwordValue=password.value;

    if(!rawIdentity||!passwordValue)return toast('Completá usuario y contraseña');

    const emailValue=rawIdentity.includes('@')
      ? rawIdentity.toLowerCase()
      : internalEmailFromAlias(rawIdentity);

    if(!rawIdentity.includes('@')&&normalizeInternalAlias(rawIdentity).length<3){
      return toast('El alias no es válido');
    }

    const original=button.textContent;
    button.disabled=true;
    button.textContent='Ingresando…';

    try{
      const {data,error}=await sb.auth.signInWithPassword({
        email:emailValue,
        password:passwordValue
      });

      if(error)throw error;
      session=data.session;
      await continueAfterAuthentication();
    }catch(err){
      console.error(err);
      const message=String(err?.message||'');
      toast(message.toLowerCase().includes('invalid login credentials')
        ? 'Usuario o contraseña incorrectos'
        : message||'No se pudo ingresar');
    }finally{
      if(document.getElementById('authBtn')){
        button.disabled=false;
        button.textContent=original;
      }
    }
  }

  button.onclick=login;
  password.addEventListener('keydown',event=>{
    if(event.key==='Enter')login();
  });
}

function bindOwnerRegistration(){

    const original=button.textContent;

async function loadGroups(){
  app.innerHTML='<div class="spinner">Cargando tus espacios…</div>';

  const {data:permissionData,error:permissionError}=await sb.rpc('current_platform_permissions');
  if(permissionError){
    console.warn('No se pudieron consultar los permisos centrales:',permissionError.message);
    platformPermissions={is_platform_admin:false,can_create_spaces:false,can_manage_access:false};
  }else{
    const permission=Array.isArray(permissionData)?permissionData[0]:permissionData;
    platformPermissions={
      is_platform_admin:permission?.is_platform_admin===true,
      can_create_spaces:permission?.can_create_spaces===true,
      can_manage_access:permission?.can_manage_access===true
    };
  }

  if(error){toast(error.message);return}
  groups=(data||[]).map(x=>({...x.groups,membership:x}));

async function loadSpacesDashboard(){
  const owned=groups.filter(g=>g.created_by===session.user.id&&(g.status||'active')!=='deleted');
  spacesDashboard={ownedGroupIds:owned.map(g=>g.id),services:[],obligations:[],payments:[],documents:[]};

  if(!owned.length)return;

  const groupIds=owned.map(g=>g.id);

  const [servicesResult,obligationsResult,paymentsResult,documentsResult]=await Promise.all([
    sb.from('services').select('id,group_id,name,active,is_private').in('group_id',groupIds).eq('active',true),
    sb.from('obligations').select('id,service_id,period,amount,status,services!inner(group_id)').in('services.group_id',groupIds),
    sb.from('payments').select('id,obligation_id,total_amount,paid_at,obligations!inner(service_id,services!inner(group_id))').in('obligations.services.group_id',groupIds),
    sb.from('documents').select('id,group_id,obligation_id,payment_id,kind').in('group_id',groupIds)
  ]);

  const error=[servicesResult,obligationsResult,paymentsResult,documentsResult].find(result=>result.error)?.error;
  if(error){
    console.warn('No se pudieron cargar métricas generales:',error.message);
    return;
  }

  spacesDashboard.services=servicesResult.data||[];
  spacesDashboard.obligations=(obligationsResult.data||[]).map(({services,...row})=>({
    ...row,
    group_id:Array.isArray(services)?services[0]?.group_id:services?.group_id
  }));
  spacesDashboard.payments=(paymentsResult.data||[]).map(({obligations,...row})=>({
    ...row,
    group_id:Array.isArray(obligations?.services)
      ? obligations.services[0]?.group_id
      : obligations?.services?.group_id
  }));
  spacesDashboard.documents=documentsResult.data||[];
}
function dashboardPaidFor(obligationId){
  return spacesDashboard.payments
    .filter(payment=>payment.obligation_id===obligationId)
    .reduce((sum,payment)=>sum+Number(payment.total_amount||0),0);
}
function dashboardBalanceFor(obligation){
  return Math.max(0,Number(obligation.amount||0)-dashboardPaidFor(obligation.id));
}
function dashboardMetricsForGroup(groupId){
  const year=baseMonth.slice(0,4);
  const obligationsForGroup=spacesDashboard.obligations.filter(item=>
    item.group_id===groupId
    && item.period?.startsWith(year)
    && item.status!=='cancelled'
  );
  const paymentsForGroup=spacesDashboard.payments.filter(item=>item.group_id===groupId);
  const paymentIds=new Set(paymentsForGroup.map(item=>item.id));

  const total=obligationsForGroup.reduce((sum,item)=>sum+Number(item.amount||0),0);
  const paid=obligationsForGroup.reduce((sum,item)=>sum+dashboardPaidFor(item.id),0);
  const pending=obligationsForGroup.reduce((sum,item)=>sum+dashboardBalanceFor(item),0);
  const unpaid=obligationsForGroup.filter(item=>dashboardBalanceFor(item)>0.01).length;
  const invoices=spacesDashboard.documents.filter(item=>
    item.group_id===groupId
    && item.kind==='invoice'
    && obligationsForGroup.some(obligation=>obligation.id===item.obligation_id)
  ).length;
  const receipts=spacesDashboard.documents.filter(item=>
    item.group_id===groupId
    && item.kind==='receipt'
    && paymentIds.has(item.payment_id)
  ).length;
  const activeServices=spacesDashboard.services.filter(item=>item.group_id===groupId).length;
  const averageMonthly=total/12;

  return{groupId,total,paid,pending,unpaid,invoices,receipts,activeServices,averageMonthly,obligations:obligationsForGroup.length};
}

      <div class="owner-metric"><span>Promedio mensual</span><strong>${fmtMoney(total.averageMonthly)}</strong></div>
    </div>

    <table class="owner-table">
      <thead>
        <tr>
          <th>Espacio</th>
          <th>Total anual</th>
          <th>Pagado</th>
          <th>Pendiente</th>
          <th>Promedio mensual</th>
          <th>Servicios</th>
          <th>Facturas</th>
          <th>Comprob.</th>
          <th>No abonados</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(row=>`<tr>
          <td><strong>${esc(row.group.name)}</strong><br><small>${row.group.type==='company'?'Empresa':'Grupo familiar'}</small></td>
          <td>${fmtMoney(row.metrics.total)}</td>
          <td>${fmtMoney(row.metrics.paid)}</td>
          <td>${fmtMoney(row.metrics.pending)}</td>

          <td>${row.metrics.invoices}</td>
          <td>${row.metrics.receipts}</td>
          <td>${row.metrics.unpaid}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}


function hasOwnerSpaces(){
  return groups.some(g=>g.created_by===session.user.id&&(g.status||'active')!=='deleted');
}
function cardBrandLabel(value){
  return {visa:'Visa',mastercard:'Mastercard',amex:'Amex',mercado_pago:'Mercado Pago',other:'Otra'}[value]||'Tarjeta';
}
function cardHolderTypeLabel(value){
  return {titular:'Titular',adicional:'Adicional'}[value]||'Titular';
}
function statementStatusLabel(value){
  return {
    open:'Abierto',
    closed:'Cerrado',
    pending_payment:'Pendiente de pago',
    partial:'Pago parcial',
    paid:'Pagado',
    reviewed:'Revisado'
  }[value]||'Abierto';
}
function movementClassLabel(value){
  return {
    gr:'GR',
    personal:'Personal',
    rizzo:'Rizzo',
    casa:'Casa',
    impuesto:'Impuesto',
    devolucion:'Devolución',
    ajuste:'Ajuste',
    otro:'Otro'
  }[value]||'Otro';
}
function fmtUsd(value){
  return `USD ${Number(value||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
}
function creditCardName(card){
  if(!card)return 'Tarjeta';
  const brand=cardBrandLabel(card.brand);
  const last=card.last4?` ${card.last4}`:'';
  return `${brand}${last} · ${card.issuer||'Sin banco'}`;
}
function creditStatementLabel(statement){
  return statement?.statement_month?monthLabel(statement.statement_month.slice(0,7)):'Resumen';
}
function creditMovementsForStatement(statementId){
  return creditMovements.filter(item=>item.statement_id===statementId);
}
function creditTotalsForMovements(items){
  const totalArs=items
    .filter(item=>item.currency==='ARS')
    .reduce((sum,item)=>sum+Number(item.amount||0),0);
  const totalUsd=items
    .filter(item=>item.currency==='USD')
    .reduce((sum,item)=>sum+Number(item.amount||0),0);
  const grArs=items
    .filter(item=>item.classification==='gr'&&item.currency==='ARS')
    .reduce((sum,item)=>sum+Number(item.amount||0),0);
  const grUsd=items
    .filter(item=>item.classification==='gr'&&item.currency==='USD')
    .reduce((sum,item)=>sum+Number(item.amount||0),0);
  const personalArs=items
    .filter(item=>item.classification==='personal'&&item.currency==='ARS')
    .reduce((sum,item)=>sum+Number(item.amount||0),0);
  const personalUsd=items
    .filter(item=>item.classification==='personal'&&item.currency==='USD')
    .reduce((sum,item)=>sum+Number(item.amount||0),0);
  return{totalArs,totalUsd,grArs,grUsd,personalArs,personalUsd};
}
async function loadCreditCardsData(){
  if(!hasOwnerSpaces()){
    creditCards=[];
    creditStatements=[];
    creditMovements=[];
    selectedCreditCardId=null;
    selectedCreditStatementId=null;
    return;
  }

  const [cardsResult,statementsResult,movementsResult]=await Promise.all([
    sb.from('credit_cards').select('*').eq('active',true).order('created_at',{ascending:false}),
    sb.from('credit_card_statements').select('*').order('statement_month',{ascending:false}),
    sb.from('credit_card_movements').select('*').order('movement_date',{ascending:false}).order('created_at',{ascending:false})
  ]);

  const error=[cardsResult,statementsResult,movementsResult].find(result=>result.error)?.error;
  if(error){
    toast(error.message);
    return;
  }

  creditCards=cardsResult.data||[];
  creditStatements=statementsResult.data||[];
  creditMovements=movementsResult.data||[];

  if(selectedCreditCardId&&!creditCards.some(card=>card.id===selectedCreditCardId))selectedCreditCardId=null;
  if(!selectedCreditCardId&&creditCards.length)selectedCreditCardId=creditCards[0].id;

  const selectedStatements=creditStatements.filter(statement=>statement.card_id===selectedCreditCardId);
  if(selectedCreditStatementId&&!selectedStatements.some(statement=>statement.id===selectedCreditStatementId))selectedCreditStatementId=null;
  if(!selectedCreditStatementId&&selectedStatements.length)selectedCreditStatementId=selectedStatements[0].id;
}

function bindCreditCardsModule(){
  document.getElementById('backToSpaces').onclick=()=>loadGroups();
  document.getElementById('newCreditCard').onclick=()=>openCreditCardModal();

  document.querySelectorAll('[data-credit-card]').forEach(element=>{
    element.onclick=()=>{
      selectedCreditCardId=element.dataset.creditCard;
      selectedCreditStatementId=null;
      const statements=creditStatements.filter(statement=>statement.card_id===selectedCreditCardId);
      if(statements.length)selectedCreditStatementId=statements[0].id;
      renderCreditCardsModule();
    };
  });

  document.querySelectorAll('[data-credit-statement]').forEach(element=>{
    element.onclick=()=>{
      selectedCreditStatementId=element.dataset.creditStatement;
      renderCreditCardsModule();
    };
  });

  if(document.getElementById('editCreditCard')){
    document.getElementById('editCreditCard').onclick=()=>openCreditCardModal(creditCards.find(card=>card.id===selectedCreditCardId));
  }
  if(document.getElementById('archiveCreditCard')){
    document.getElementById('archiveCreditCard').onclick=archiveCreditCard;
  }
  if(document.getElementById('newStatement')){
    document.getElementById('newStatement').onclick=()=>openCreditStatementModal();
  }
  if(document.getElementById('editStatement')){
    document.getElementById('editStatement').onclick=()=>openCreditStatementModal(creditStatements.find(statement=>statement.id===selectedCreditStatementId));
  }
  if(document.getElementById('newMovement')){
    document.getElementById('newMovement').onclick=()=>openCreditMovementModal();
  }
  document.querySelectorAll('[data-edit-movement]').forEach(button=>{
    button.onclick=()=>openCreditMovementModal(creditMovements.find(movement=>movement.id===button.dataset.editMovement));
  });
}

async function archiveCreditCard(){
  if(!selectedCreditCardId)return;
  if(!confirm('¿Archivar esta tarjeta? No se borran sus resúmenes ni movimientos.'))return;
  const {error}=await sb.from('credit_cards').update({active:false}).eq('id',selectedCreditCardId);
  if(error)return toast(error.message);
  selectedCreditCardId=null;
  selectedCreditStatementId=null;
  await loadCreditCardsData();
  renderCreditCardsModule();
}

function renderGroups(){
  const activeGroups=groups.filter(g=>(g.status||'active')==='active');
  const suspendedGroups=groups.filter(g=>g.status==='suspended');
  const archivedGroups=groups.filter(g=>g.status==='archived');
  const deletedGroups=groups.filter(g=>g.status==='deleted');

  const spaceCard=(g)=>{
    const owner=g.created_by===session.user.id;
    const status=g.status||'active';
    const canOpen=status==='active';
    return `<div class="workspace card" ${canOpen?`data-group="${g.id}"`:''} style="${canOpen?'':'cursor:default'}">
      <h3>${esc(g.name)}</h3>
      <p>
        ${g.type==='company'?'Empresa':'Grupo familiar'} ·
        ${owner?'Administrador principal':roleLabel(g.membership?.role)}
        <span class="alias-chip">${esc(g.membership.display_name)}</span>
        ${owner?'<span class="owner-chip">Titular</span>':''}
      </p>
      ${status==='suspended'?'<span class="space-status suspended">Suspendido</span>':''}
      ${status==='archived'?'<span class="space-status archived">Archivado</span>':''}
      ${status==='deleted'?'<span class="space-status deleted">Eliminado</span>':''}
      ${owner?`<div class="workspace-actions">
        ${status==='active'?`
          <button class="btn outline small" data-space-action="suspended" data-space-id="${g.id}">Suspender</button>
          <button class="btn soft small" data-space-action="archived" data-space-id="${g.id}">Archivar</button>
          <button class="btn danger small" data-space-action="deleted" data-space-id="${g.id}">Eliminar</button>
        `:status==='deleted'?`
          <button class="btn primary small" data-space-action="active" data-space-id="${g.id}">Restaurar</button>
        `:`
          <button class="btn primary small" data-space-action="active" data-space-id="${g.id}">Reactivar</button>
          <button class="btn danger small" data-space-action="deleted" data-space-id="${g.id}">Eliminar</button>
        `}
      </div>`:''}
    </div>`;
  };

  app.innerHTML=`<main>
    <div class="pagehead">
      <div>
        <h1>Tus espacios</h1>
        <p>Panel general del titular, accesos y espacios. Eliminar oculta el espacio sin borrar su información.</p>
      </div>
      <div class="actions">
        ${platformPermissions.can_create_spaces?'<button class="btn primary" id="newGroup">+ Crear espacio</button>':''}
        <button class="btn soft" id="logout">Salir</button>
      </div>
    </div>

    ${renderOwnerDashboard()}

    ${hasOwnerSpaces()?`<div class="card owner-panel" style="margin-bottom:18px">
      <div class="statement-top">
        <div>
          <h2>Tarjetas de crédito BETA</h2>
          <p class="sub">Módulo privado del titular. No se comparte con administradores ni consulta.</p>
        </div>
        <button class="btn primary" id="openCreditCards">Abrir Tarjetas BETA</button>
      </div>
    </div>`:''}

    <div class="workspace-grid">
      ${activeGroups.map(spaceCard).join('')||`<div class="card workspace" style="cursor:default">
        <h3>Sin espacios activos</h3>
        <p>No tenés espacios activos disponibles en este momento.</p>
      </div>`}
    </div>

    ${suspendedGroups.length?`
      <div class="archived-section">
        <h2>Espacios suspendidos</h2>
        <p class="sub">No pueden utilizarse hasta que el titular los reactive.</p>
        <div class="workspace-grid">${suspendedGroups.map(spaceCard).join('')}</div>
      </div>
    `:''}

    ${archivedGroups.length?`
      <details class="archived-section">
        <summary>Espacios archivados (${archivedGroups.length})</summary>
        <p class="sub">Están ocultos de la vista principal y conservan toda su información.</p>
        <div class="workspace-grid">${archivedGroups.map(spaceCard).join('')}</div>
      </details>
    `:''}

    ${deletedGroups.length?`
      <details class="archived-section">
        <summary>Espacios eliminados (${deletedGroups.length})</summary>
        <p class="sub">Están ocultos del uso normal. La información sigue conservada y podés restaurarlos.</p>
        <div class="workspace-grid">${deletedGroups.map(spaceCard).join('')}</div>
      </details>
    `:''}
  </main>`;

  document.querySelectorAll('[data-group]').forEach(element=>{
    element.onclick=()=>openGroup(element.dataset.group);
  });

  document.querySelectorAll('[data-space-action]').forEach(button=>{
    button.onclick=async event=>{
      event.stopPropagation();
      const status=button.dataset.spaceAction;
      const id=button.dataset.spaceId;
      const labels={
        suspended:'suspender',
        archived:'archivar',
        deleted:'eliminar',
        active:'reactivar'
      };
      const message=status==='active'
        ? '¿Reactivar este espacio? Volverá a estar disponible para sus integrantes.'
        : status==='deleted'
          ? '¿Eliminar este espacio del uso normal? No se borrarán facturas, pagos, comprobantes ni usuarios. Podrás restaurarlo desde Espacios eliminados.'
          : `¿${labels[status][0].toUpperCase()+labels[status].slice(1)} este espacio? Toda la información se conservará.`;
      if(!confirm(message))return;

      button.disabled=true;
      const {error}=await sb.rpc('set_group_status',{p_group_id:id,p_status:status});
      if(error){
        button.disabled=false;
        return toast(error.message);
      }
      toast(status==='active'?'Espacio reactivado':status==='suspended'?'Espacio suspendido':status==='archived'?'Espacio archivado':'Espacio eliminado');
      await loadGroups();
    };
  });

  document.getElementById('logout').onclick=()=>sb.auth.signOut();
  if(document.getElementById('newGroup'))document.getElementById('newGroup').onclick=openCreateGroup;
  if(document.getElementById('openCreditCards'))document.getElementById('openCreditCards').onclick=openCreditCardsModule;

function openCreateGroup(){

  modal(`<h2>Crear espacio</h2><div class="sub">Casa, negocio u otro grupo independiente.</div>
  <div class="field"><label>Nombre</label><input id="gname" placeholder="Ej: Casa"></div>
  <div class="field"><label>Tipo</label><select id="gtype"><option value="family">Grupo familiar</option><option value="company">Empresa</option></select></div>

async function openGroup(id){
  group=groups.find(g=>g.id===id)||{id};
  if((group.status||'active')!=='active'){
    toast(group.status==='suspended'?'Este espacio está suspendido':group.status==='deleted'?'Este espacio está eliminado':'Este espacio está archivado');
    return;
  }
  membership=group.membership||null;
  app.innerHTML='<div class="spinner">Sincronizando información…</div>';
  await reloadGroup();
  renderApp();
}
async function reloadGroup(){
  const [m,s,o,p,c,d,g]=await Promise.all([
    sb.from('memberships').select('*').eq('group_id',group.id).eq('active',true).order('created_at'),

function obligationFor(serviceId,key){return obligations.find(o=>o.service_id===serviceId&&o.period===periodDate(key))}
function normalizeServiceName(value){
  return String(value||'')
    .trim()
    .toLocaleLowerCase('es-AR')
    .replace(/\s+/g,' ');
}
function frequencyLabel(service){
  if(service.frequency==='monthly')return 'Mensual';
  if(service.frequency==='plan')return 'Plan';
  return 'Puntual';
}
function planMonthNumbers(service){
  return Array.isArray(service.plan_months)
    ? service.plan_months.map(Number)
    : [];
}
function monthAppliesToService(service,key){
  const current=periodDate(key);
  const start=service.plan_start_month;

  if(service.frequency==='monthly'){
    return !start || current>=start;
  }

  if(service.frequency==='one_time'){
    return start ? current===start : true;
  }

  if(service.frequency!=='plan')return true;

  const end=service.plan_end_month;
  const monthNumber=Number(key.split('-')[1]);

  if(!start||!end)return false;
  return current>=start
    && current<=end
    && planMonthNumbers(service).includes(monthNumber);
}
function servicePlanDescription(service){
  if(service.frequency!=='plan')return '';
  const months=planMonthNumbers(service);
  const short=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const selected=months.map(m=>short[m-1]).filter(Boolean).join(', ');
  const start=service.plan_start_month?monthLabel(service.plan_start_month.slice(0,7)):'—';
  const end=service.plan_end_month?monthLabel(service.plan_end_month.slice(0,7)):'—';
  return `${start} a ${end}${selected?' · '+selected:''}`;
}
function serviceStartLabel(service){
  if(service.frequency==='plan')return '';
  if(!service.plan_start_month)return '';
  const label=monthLabel(service.plan_start_month.slice(0,7));
  return service.frequency==='one_time'
    ? ` · Inicio ${label}`
    : ` · Desde ${label}`;
}

function emptyBoxText(service){
  if(service.frequency==='one_time')return ['Sin movimiento','Cargar si corresponde'];
  return ['Sin datos','Cargar importe y vencimiento'];
}
function paymentsFor(obligationId){
  return payments
    .filter(p=>p.obligation_id===obligationId)
    .sort((a,b)=>(b.paid_at||'').localeCompare(a.paid_at||'')||String(b.created_at||'').localeCompare(String(a.created_at||'')));
}
function paymentFor(obligationId){return paymentsFor(obligationId)[0]||null}
function paidAmountFor(obligationId){
  return paymentsFor(obligationId).reduce((sum,p)=>sum+Number(p.total_amount||0),0);
}
function balanceFor(obligation){
  if(!obligation)return 0;
  return Math.max(0,Number(obligation.amount||0)-paidAmountFor(obligation.id));
}
function paymentProgress(obligation){
  const amount=Number(obligation?.amount||0);
  const paid=paidAmountFor(obligation?.id);
  const balance=Math.max(0,amount-paid);
  return{amount,paid,balance,fullyPaid:amount>0&&balance<=0.01,partial:paid>0&&balance>0.01};
}
function receiptsForPayment(paymentId){
  return documents.filter(d=>d.payment_id===paymentId&&d.kind==='receipt');
}
function receiptsForObligation(obligationId){
  const ids=paymentsFor(obligationId).map(p=>p.id);
  return documents.filter(d=>ids.includes(d.payment_id)&&d.kind==='receipt');
}
async function syncObligationStatus(obligationId){
  if(!obligationId)return;
  const {error}=await sb.rpc('sync_obligation_payment_status',{p_obligation_id:obligationId});
  if(error)console.warn('No se pudo sincronizar el estado de la factura:',error.message);
}

function consolidationForSource(obligationId){
  return consolidations.find(item=>item.source_obligation_id===obligationId)||null;
}
function consolidationsForTarget(obligationId){
  return consolidations.filter(item=>item.target_obligation_id===obligationId);
}
function consolidatedSourceObligations(targetId){
  const ids=consolidationsForTarget(targetId).map(item=>item.source_obligation_id);
  return obligations.filter(item=>ids.includes(item.id));
}
function consolidationTarget(sourceId){
  const link=consolidationForSource(sourceId);
  return link?obligations.find(item=>item.id===link.target_obligation_id)||null:null;
}
function includedAmountForTarget(targetId){
  return consolidatedSourceObligations(targetId)
    .reduce((sum,item)=>sum+Number(item.amount||0),0);
}
function netNewAmount(obligation){
  if(!obligation)return 0;
  return Math.max(0,Number(obligation.amount||0)-includedAmountForTarget(obligation.id));
}
function isEffectivePending(obligation){
  return !!obligation
    && balanceFor(obligation)>0.01
    && obligation.status!=='cancelled'
    && !consolidationForSource(obligation.id);
}
function inclusionDescription(obligation){
  const target=consolidationTarget(obligation.id);
  return target?`Incluida en ${monthLabel(target.period.slice(0,7))}`:'';
}
function dueState(o){
  if(!o)return{cls:'missing',label:'Sin datos'};
  const target=consolidationTarget(o.id);
  if(target)return{cls:'included',label:`Incluida en ${monthLabel(target.period.slice(0,7))}`};
  const progress=paymentProgress(o);
  if(o.status==='paid'||progress.fullyPaid)return{cls:'paid',label:'Abonado'};
  const d=daysUntil(o.due_date);
  if(d===null)return{cls:'missing',label:'Falta vencimiento'};
  const prefix=progress.partial?'Saldo parcial · ':'';
  if(d<0)return{cls:'overdue',label:`${prefix}Vencido hace ${Math.abs(d)} día${Math.abs(d)===1?'':'s'}`};
  if(d===0)return{cls:'urgent',label:`${prefix}Vence hoy`};
  if(d<=2)return{cls:'urgent',label:`${prefix}Faltan ${d} días`};
  if(d<=5)return{cls:'warning',label:`${prefix}Faltan ${d} días`};
  if(d<=10)return{cls:'due-green-soft',label:`${prefix}Faltan ${d} días`};
  return{cls:'due-green',label:`${prefix}Faltan ${d} días`};
}
function boxClass(o){return dueState(o).cls}
function boxText(o,service){
  if(!o)return emptyBoxText(service);
  const target=consolidationTarget(o.id);
  if(target)return[`Incluida en ${monthLabel(target.period.slice(0,7))}`,fmtMoney(o.amount)];
  const progress=paymentProgress(o);
  if(o.status==='paid'||progress.fullyPaid)return['Abonado',fmtMoney(progress.paid||o.amount)];
  if(progress.partial)return[`Parcial · saldo ${fmtMoney(progress.balance)}`,`Pagado ${fmtMoney(progress.paid)} de ${fmtMoney(progress.amount)}`];
  return[dueState(o).label,fmtMoney(o.amount)];
}
function lastKnownAmount(serviceId,beforeKey){
  const limit=periodDate(beforeKey);
  const previous=obligations
    .filter(o=>o.service_id===serviceId&&o.period<limit&&Number(o.amount)>0)
    .sort((a,b)=>b.period.localeCompare(a.period))[0];
  return previous?netNewAmount(previous):null;
}
function forecastMonth(key){
  let confirmed=0,estimated=0,missing=0;
  services.forEach(service=>{
    const obligation=obligationFor(service.id,key);
    if(obligation){
      if(isEffectivePending(obligation))confirmed+=Number(obligation.amount||0);
      return;
    }
    if(service.frequency==='one_time'||!monthAppliesToService(service,key))return;
    const previous=lastKnownAmount(service.id,key);
    if(previous)estimated+=Number(previous);else missing++;
  });
  return{key,confirmed,estimated,total:confirmed+estimated,missing};
}
function renderForecast(){
  const months=Array.from({length:6},(_,i)=>shiftMonth(baseMonth,i));
  const admins=members.filter(m=>m.role==='admin'&&Number(m.participation_percent)>0);

}
function pendingObligations(){
  return obligations
    .filter(isEffectivePending)
    .sort((a,b)=>(a.due_date||'9999').localeCompare(b.due_date||'9999'));
}
function monthTotals(key){
  const monthRows=obligations.filter(o=>
    o.period===periodDate(key)
    && o.status!=='cancelled'
  );
  const total=monthRows.reduce((sum,o)=>sum+Number(o.amount||0),0);
  const paid=monthRows.reduce((sum,o)=>sum+paidAmountFor(o.id),0);
  const included=monthRows
    .filter(o=>consolidationForSource(o.id))
    .reduce((sum,o)=>sum+Number(o.amount||0),0);
  const pending=monthRows
    .filter(isEffectivePending)
    .reduce((sum,o)=>sum+balanceFor(o),0);
  return{
    key,
    count:monthRows.length,
    total,
    paid,
    included,
    pending
  };
}
function monthQuickSummary(key){
  const rows=obligations.filter(o=>
    o.period===periodDate(key)
    && o.status!=='cancelled'
  );
  const totals=monthTotals(key);
  const withInvoice=rows.filter(o=>
    documents.some(d=>d.obligation_id===o.id&&d.kind==='invoice')
  ).length;
  const withReceipt=rows.filter(o=>
    receiptsForObligation(o.id).length>0
  ).length;
  const unpaid=rows.filter(isEffectivePending).length;
  const missing=services.filter(service=>
    service.frequency!=='one_time'
    && monthAppliesToService(service,key)
    && !obligationFor(service.id,key)
  ).length;

  return{
    ...totals,
    withInvoice,
    withReceipt,
    unpaid,
    missing
  };
}

async function loadDocumentPreviews(root=document){
  const nodes=[...root.querySelectorAll('[data-document-preview]')];

  await Promise.all(nodes.map(async node=>{
    const documentId=node.dataset.documentPreview;
    const documentData=documents.find(item=>item.id===documentId);
    if(!documentData)return;

    const {data,error}=await sb.storage
      .from('documents')
      .createSignedUrl(documentData.file_path,120);

    if(error){
      node.innerHTML='<div class="document-placeholder">Sin vista previa</div>';
      return;
    }

    node.innerHTML='';

    if(String(documentData.mime_type||'').startsWith('image/')){
      const image=document.createElement('img');
      image.src=data.signedUrl;
      image.alt=documentData.original_name||'Factura';
      image.loading='lazy';
      node.appendChild(image);
    }else if(documentData.mime_type==='application/pdf'){
      const frame=document.createElement('iframe');
      frame.src=`${data.signedUrl}#toolbar=0&navpanes=0&scrollbar=0`;
      frame.title=documentData.original_name||'Documento PDF';
      frame.loading='lazy';
      node.appendChild(frame);
    }else{
      node.innerHTML='<div class="document-placeholder">Documento</div>';
    }

    node.onclick=()=>openStoredDocument(documentData.file_path);
  }));
}

async function deleteStoredDocument(documentId,onDelete){
  if(!canDelete())return toast('No tenés permiso para quitar documentos');

  const documentData=documents.find(item=>item.id===documentId);
  if(!documentData)return toast('No se encontró el documento');

  const documentLabel=documentData.kind==='receipt'?'comprobante de pago':'factura';

  if(!confirm(`¿Quitar el ${documentLabel} "${documentData.original_name||'archivo'}"?\n\nEl pago registrado no se modificará. Esta acción no se puede deshacer.`)){
    return;
  }

  const {error:rowError}=await sb
    .from('documents')
    .delete()
    .eq('id',documentId);

  if(rowError)return toast(rowError.message);

  const {error:storageError}=await sb.storage
    .from('documents')
    .remove([documentData.file_path]);

  if(storageError)console.warn('No se pudo eliminar el archivo físico:',storageError.message);

  await reloadGroup();
  toast(documentData.kind==='receipt'?'Comprobante quitado':'Factura quitada');

  if(typeof onDelete==='function')onDelete();
  else renderApp();
}

async function uploadDoc(file,serviceId,obligationId,paymentId,kind){
  const allowed=['image/jpeg','image/png','image/webp','application/pdf'];
  if(!allowed.includes(file.type))throw new Error('Formato de archivo no admitido');
  if(file.size>10*1024*1024)throw new Error('El archivo supera el límite de 10 MB');

  const safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const filePath=`${group.id}/${serviceId}/${Date.now()}_${Math.random().toString(36).slice(2,8)}_${safe}`;

  const {error:uploadError}=await sb.storage
    .from('documents')
    .upload(filePath,file,{
      contentType:file.type,
      upsert:false,
      cacheControl:'3600'
    });

  if(uploadError)throw uploadError;

  const {error:documentError}=await sb.from('documents').insert({
    group_id:group.id,
    obligation_id:obligationId,
    payment_id:paymentId,
    kind,
    file_path:filePath,
    original_name:file.name,
    mime_type:file.type,
    size_bytes:file.size,
    uploaded_by:session.user.id
  });

  if(documentError){
    await sb.storage.from('documents').remove([filePath]);
    throw documentError;
  }

  return filePath;
}

function renderServices(ms){

function balanceData(){
  const rows=members.filter(m=>m.role==='admin'&&Number(m.participation_percent)>0).map(m=>({m,owed:0,paid:0,balance:0}));
  payments.forEach(p=>{const o=obligations.find(x=>x.id===p.obligation_id);if(!o)return;const amount=Number(p.total_amount||0),sumShares=rows.reduce((a,r)=>a+Number(r.m.participation_percent||0),0)||100;rows.forEach(r=>r.owed+=amount*Number(r.m.participation_percent||0)/sumShares);contributions.filter(c=>c.payment_id===p.id).forEach(c=>{const r=rows.find(x=>x.m.id===c.membership_id);if(r)r.paid+=Number(c.amount||0)})});
  rows.forEach(r=>r.balance=r.paid-r.owed);return rows;
}
function renderBalance(){const rows=balanceData();return `<div class="balance card"><h2>Equilibrio acumulado</h2><p>Compara lo que correspondía pagar con lo efectivamente aportado.</p><div class="balancegrid">${rows.map(r=>`<div class="person"><strong>${esc(r.m.display_name)}</strong><div class="money ${r.balance>1?'positive':r.balance<-1?'negative':'neutral'}">${r.balance>=0?'+':''}${fmtMoney(r.balance)}</div><small>Correspondía ${fmtMoney(r.owed)} · Pagó ${fmtMoney(r.paid)}</small></div>`).join('')||'<div class="person">Definí los porcentajes de los administradores.</div>'}</div></div>`}
function reportMonthData(key){
  const monthObligations=obligations.filter(o=>o.period===periodDate(key)&&o.status!=='cancelled');
  const total=monthObligations.reduce((sum,o)=>sum+Number(o.amount||0),0);
  const paid=monthObligations.reduce((sum,o)=>sum+paidAmountFor(o.id),0);
  const pending=monthObligations
    .filter(isEffectivePending)
    .reduce((sum,o)=>sum+balanceFor(o),0);
  return{key,total,paid,pending};
}
function reportCategoryData(){
  const year=baseMonth.slice(0,4);
  const totals=new Map();
  obligations.filter(o=>o.period.startsWith(year)&&o.status!=='cancelled').forEach(o=>{
    const service=services.find(s=>s.id===o.service_id);
    const label=service?.category||'Otro';
    totals.set(label,(totals.get(label)||0)+netNewAmount(o));
  });
  return[...totals.entries()].map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
}
function reportServiceData(){
  const year=baseMonth.slice(0,4);
  const totals=new Map();
  obligations.filter(o=>o.period.startsWith(year)&&o.status!=='cancelled').forEach(o=>{
    const service=services.find(s=>s.id===o.service_id);
    if(!service)return;
    totals.set(service.name,(totals.get(service.name)||0)+netNewAmount(o));
  });
  return[...totals.entries()].map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value).slice(0,6);
}
function renderReportBars(items,emptyText){
  if(!items.length)return`<div class="notice">${emptyText}</div>`;
  const max=Math.max(...items.map(item=>item.value),1);
  return items.map(item=>`<div class="report-row">
    <div class="report-label">${esc(item.label)}</div>
    <div class="report-track"><div class="report-fill" style="width:${Math.max(3,item.value/max*100)}%"></div></div>
    <div class="report-value">${fmtMoney(item.value)}</div>
  </div>`).join('');
}

function safeFileName(value){
  return String(value||'reporte')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-zA-Z0-9_-]+/g,'_')
    .replace(/^_+|_+$/g,'');
}

async function downloadReportPdf(){
  const element=document.getElementById('reportPrintable');
  const button=document.getElementById('downloadReportBtn');
  if(!element)return toast('No se encontró el reporte');

  if(typeof window.html2pdf!=='function'){
    toast('No se pudo cargar el generador de PDF. Se abrirá la impresión.');
    return window.print();
  }

  const original=button?.textContent||'Descargar PDF';
  if(button){button.disabled=true;button.textContent='Generando PDF…'}

  try{
    const filename=`Reporte_${safeFileName(group.name)}_${baseMonth}.pdf`;
    await window.html2pdf()
      .set({
        margin:[8,8,8,8],
        filename,
        image:{type:'jpeg',quality:0.98},
        html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},
        jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
        pagebreak:{mode:['css','legacy'],avoid:['.report-card','.report-panel','.forecast-month']}
      })
      .from(element)
      .save();
    toast('Reporte descargado');
  }catch(err){
    console.error('Error generando PDF:',err);
    toast('No se pudo generar el PDF. Usá el botón Imprimir.');
  }finally{
    if(button){button.disabled=false;button.textContent=original}
  }
}

function renderPaid(){

  const list=payments
    .slice()
    .sort((a,b)=>{
      const dateOrder=b.paid_at.localeCompare(a.paid_at);
      return dateOrder||String(b.created_at||'').localeCompare(String(a.created_at||''));
    })
    .filter(payment=>{
      if(seenObligations.has(payment.obligation_id))return false;
      seenObligations.add(payment.obligation_id);
      return true;
    });

  return `<div class="pagehead">
    <div>
      <h1>Abonados</h1>
      <p>Historial completo de pagos y comprobantes. Cada factura mensual aparece una sola vez.</p>
    </div>
  </div>

  <div class="list card">
    ${list.map(p=>{
      const o=obligations.find(x=>x.id===p.obligation_id);
      const s=services.find(x=>x.id===o?.service_id);

      return `<div class="row">
        <div>
          <h3>${esc(s?.name||'Servicio')}</h3>
          <p>${o?monthLabel(o.period.slice(0,7)):'Pago'} · abonado ${fmtDate(p.paid_at)}</p>
        </div>
        <div>
          <div class="amountbig">${fmtMoney(p.total_amount)}</div>
          <button class="btn soft small" data-payment="${p.id}">Abrir</button>
        </div>
      </div>`;
    }).join('')||'<div class="row"><p>Todavía no hay pagos registrados.</p></div>'}
  </div>`;
}
function bindDashboard(ms){
  if(document.getElementById('prevMonth'))prevMonth.onclick=()=>{baseMonth=shiftMonth(baseMonth,-1);renderApp()};
  if(document.getElementById('nextMonth'))nextMonth.onclick=()=>{baseMonth=shiftMonth(baseMonth,1);renderApp()};
  if(document.getElementById('addService'))document.getElementById('addService').onclick=()=>openServiceModal();
  document.querySelectorAll('[data-overview-month]').forEach(e=>e.onclick=()=>{
    baseMonth=e.dataset.overviewMonth;
    renderApp();
  });
  document.querySelectorAll('[data-cell]').forEach(e=>e.onclick=()=>{const [s,m]=e.dataset.cell.split('|');openObligation(s,m)});
  document.querySelectorAll('[data-folder]').forEach(e=>e.onclick=()=>openFolder(e.dataset.folder));
  document.querySelectorAll('[data-old-debt]').forEach(e=>e.onclick=()=>{
    const [serviceId,monthKey]=e.dataset.oldDebt.split('|');
    openObligation(serviceId,monthKey);
  });
  document.querySelectorAll('[data-next-invoice]').forEach(e=>e.onclick=()=>{
    const [serviceId,monthKey]=e.dataset.nextInvoice.split('|');
    openObligation(serviceId,monthKey);
  });
  document.querySelectorAll('[data-payment]').forEach(e=>e.onclick=()=>openPaymentDetail(e.dataset.payment));
  if(document.getElementById('printReportBtn'))document.getElementById('printReportBtn').onclick=printReport;
  if(document.getElementById('downloadReportBtn'))document.getElementById('downloadReportBtn').onclick=downloadReportPdf;
}
function openServiceModal(serviceId=null){
  if(!canManageServices())return toast('No tenés permiso para editar servicios');

  const existing=serviceId
    ? services.find(service=>service.id===serviceId)
    : null;

  if(serviceId&&!existing)return toast('No se encontró el servicio');

  const editing=!!existing;
  const current=existing?.plan_start_month?.slice(0,7)||baseMonth;
  const defaultEnd=existing?.plan_end_month?.slice(0,7)||shiftMonth(current,11);
  const existingPlanMonths=existing?.frequency==='plan'
    ? planMonthNumbers(existing)
    : Array.from({length:12},(_,index)=>index+1);
  const monthNames=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const categories=availableCategories();

  modal(`<h2>${editing?'Editar servicio o impuesto':'Agregar servicio o impuesto'}</h2>
    <div class="sub">
      ${editing
        ? 'Los administradores pueden corregir el nombre, la categoría, la frecuencia y el plan.'
        : 'Elegí si es mensual, puntual o un plan con meses determinados.'}
    </div>

    <div class="field">
      <label>Nombre</label>
      <input id="sname" value="${esc(existing?.name||'')}" placeholder="Ej: Moratoria ARCA">
    </div>

    ${isOwner()?`
      <div class="field">
        <label>Privacidad</label>
        <label class="checkline">
          <input id="servicePrivate" type="checkbox" ${existing?.is_private?'checked':''}>
          <span>
            <strong>Servicio privado</strong><br>
            <small>Solo el titular podrá verlo. No aparecerá para administradores, cargadores ni usuarios de consulta.</small>
          </span>
        </label>
      </div>
    `:''}

    <div class="grid2">
      <div class="field">
        <label>Categoría</label>
        <select id="scat">
          ${categories.map(category=>`
            <option value="${esc(category)}" ${normalizeCategoryName(category)===normalizeCategoryName(existing?.category||'')?'selected':''}>
              ${esc(category)}
            </option>
          `).join('')}
          <option value="__new__">+ Crear nueva categoría</option>
        </select>

        <div id="newCategoryBox" class="category-create hidden">
          <label>Nueva categoría</label>
          <input id="newCategoryName" type="text" maxlength="60" placeholder="Ej: Publicidad">
          <div class="category-help">
            Se guardará solamente dentro de ${esc(group.name)} y no puede repetir un nombre existente.
          </div>
        </div>
      </div>

      <div class="field">
        <label>Frecuencia</label>
        <select id="sfreq">
          <option value="monthly" ${existing?.frequency==='monthly'||!existing?'selected':''}>Mensual</option>
          <option value="one_time" ${existing?.frequency==='one_time'?'selected':''}>Puntual</option>
          <option value="plan" ${existing?.frequency==='plan'?'selected':''}>Plan</option>
        </select>
      </div>
    </div>

    <div id="startFields" class="plan-fields ${existing?.frequency==='plan'?'hidden':''}">
      <div class="field">
        <label>Fecha de inicio</label>
        <input id="serviceStart" type="month" value="${current}">
        <div class="category-help">
          El servicio aparecerá desde este mes en adelante. Si es puntual, aparecerá solamente en este mes.
        </div>
      </div>
    </div>

    <div id="planFields" class="plan-fields ${existing?.frequency==='plan'?'':'hidden'}">
      <div class="grid2">
        <div class="field">
          <label>Comienza en</label>
          <input id="planStart" type="month" value="${current}">
        </div>
        <div class="field">
          <label>Finaliza en</label>
          <input id="planEnd" type="month" value="${defaultEnd}">
        </div>
      </div>

      <div class="field">
        <label>Meses en los que se paga</label>
        <div class="month-picker">
          ${monthNames.map((name,index)=>`
            <label class="month-check">
              <input
                type="checkbox"
                data-plan-month="${index+1}"
                ${existingPlanMonths.includes(index+1)?'checked':''}
              >
              <span>${name.slice(0,3)}</span>
            </label>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="modalactions">
      <button class="btn outline" data-close>Cancelar</button>
      <button class="btn primary" id="saveService">${editing?'Guardar cambios':'Guardar'}</button>
    </div>`);

  const frequency=document.getElementById('sfreq');
  const categorySelect=document.getElementById('scat');
  const newCategoryBox=document.getElementById('newCategoryBox');
  const planFields=document.getElementById('planFields');
  const startFields=document.getElementById('startFields');
  const saveButton=document.getElementById('saveService');

  frequency.onchange=()=>{
    const isPlan=frequency.value==='plan';
    planFields.classList.toggle('hidden',!isPlan);
    startFields.classList.toggle('hidden',isPlan);
  };

  categorySelect.onchange=()=>{
    newCategoryBox.classList.toggle('hidden',categorySelect.value!=='__new__');
    if(categorySelect.value==='__new__')document.getElementById('newCategoryName').focus();
  };

  saveButton.onclick=async()=>{
    const name=document.getElementById('sname').value.trim();
    if(!name)return toast('Ingresá un nombre');

    const duplicate=services.some(service=>
      service.id!==existing?.id
      && normalizeServiceName(service.name)===normalizeServiceName(name)
    );
    if(duplicate)return toast('Ya existe un servicio con ese nombre en este espacio');

    const frequencyValue=frequency.value;
    let categoryValue=categorySelect.value;

    if(categoryValue==='__new__'){
      const customName=document.getElementById('newCategoryName').value.trim();
      if(!customName)return toast('Ingresá el nombre de la nueva categoría');

      try{
        categoryValue=await createCustomCategory(customName);
      }catch(err){
        console.error('Error creando categoría:',err);
        return toast(err?.message||'No se pudo crear la categoría');
      }
    }

    const payload={
      name,
      category:categoryValue,
      frequency:frequencyValue,
      is_private:isOwner()
        ? !!document.getElementById('servicePrivate')?.checked
        : !!existing?.is_private,
      plan_start_month:null,
      plan_end_month:null,
      plan_months:null
    };

    if(frequencyValue==='plan'){
      const startValue=document.getElementById('planStart').value;
      const endValue=document.getElementById('planEnd').value;
      const selected=[...document.querySelectorAll('[data-plan-month]:checked')]
        .map(input=>Number(input.dataset.planMonth));

      if(!startValue||!endValue)return toast('Completá el inicio y el final del plan');
      if(endValue<startValue)return toast('El final del plan no puede ser anterior al inicio');
      if(!selected.length)return toast('Elegí al menos un mes de pago');

      payload.plan_start_month=periodDate(startValue);
      payload.plan_end_month=periodDate(endValue);
      payload.plan_months=selected;
    }else{
      const startValue=document.getElementById('serviceStart')?.value||baseMonth;
      if(!startValue)return toast('Completá la fecha de inicio');
      payload.plan_start_month=periodDate(startValue);
      payload.plan_end_month=null;
      payload.plan_months=null;
    }

    const original=saveButton.textContent;
    saveButton.disabled=true;
    saveButton.textContent='Guardando…';

    try{
      let result;

      if(editing){
        result=await sb
          .from('services')
          .update(payload)
          .eq('id',existing.id);
      }else{
        result=await sb
          .from('services')
          .insert({
            ...payload,
            group_id:group.id,
            created_by:session.user.id
          });
      }

      if(result.error)throw result.error;

      closeModal();
      await reloadGroup();
      renderApp();
      toast(editing?'Servicio actualizado':frequencyValue==='plan'?'Plan agregado':'Servicio agregado');
    }catch(err){
      console.error('Error guardando servicio:',err);
      const message=String(err?.message||'');

      if(message.includes('invalid input value for enum')||message.includes('plan_start_month')){
        toast('Falta ejecutar la actualización SQL para habilitar Plan');
      }else if(message.includes('Ya existe un servicio')||message.includes('duplicate key')||message.includes('23505')){
        toast('Ya existe un servicio con ese nombre en este espacio');
      }else{
        toast(message||'No se pudo guardar');
      }
    }finally{
      if(document.getElementById('saveService')){
        saveButton.disabled=false;
        saveButton.textContent=original;
      }
    }
  };
}
function openObligation(serviceId,key){
  const s=services.find(x=>x.id===serviceId);
  const o=obligationFor(serviceId,key);
  const paymentRows=o?paymentsFor(o.id):[];
  const progress=o?paymentProgress(o):{amount:0,paid:0,balance:0,fullyPaid:false,partial:false};
  const sourceLink=o?consolidationForSource(o.id):null;
  const target=sourceLink?consolidationTarget(o.id):null;
  const currentLinks=o?consolidationsForTarget(o.id):[];
  const currentSourceIds=currentLinks.map(item=>item.source_obligation_id);

  const priorCandidates=obligations
    .filter(item=>
      item.service_id===serviceId
      && item.period<periodDate(key)
      && item.status!=='cancelled'
      && balanceFor(item)>0.01
      && (
        !consolidationForSource(item.id)
        || currentSourceIds.includes(item.id)
      )
    )
    .sort((a,b)=>b.period.localeCompare(a.period));

  const existingInvoices=o
    ? documents.filter(d=>d.obligation_id===o.id&&d.kind==='invoice')
    : [];
  const currentMode=currentLinks.length?'consolidated':'additional';

  modal(`<h2>${esc(s.name)} · ${monthLabel(key)}</h2>
    <div class="sub">
      ${sourceLink
        ? `Esta deuda quedó incluida en la factura de ${monthLabel(target.period.slice(0,7))}. Se conserva como historial y no se suma dos veces.`
        : o
          ? 'Podés corregir los datos del mes, administrar facturas y registrar pagos parciales.'
          : 'Cargá los datos del mes. La factura se agrega con un botón independiente.'}
    </div>

    ${sourceLink?`
      <div class="notice">
        <strong>Deuda consolidada.</strong>
        Este importe no se suma por separado porque está incluido en
        ${monthLabel(target.period.slice(0,7))}.
      </div>`:''}

    ${o?`
      <div class="payment-summary">
        <div class="item"><span>Total factura</span><strong>${fmtMoney(progress.amount)}</strong></div>
        <div class="item"><span>Pagado</span><strong>${fmtMoney(progress.paid)}</strong></div>
        <div class="item"><span>Saldo pendiente</span><strong>${fmtMoney(progress.balance)}</strong></div>
      </div>
    `:''}

    <div class="grid2">
      <div class="field">
        <label>Importe total que figura en la factura</label>
        <input
          id="oamount"
          data-money-input
          class="money-input"
          value="${formatMoneyField(o?.amount??'')}"
          placeholder="Ej: 220.000"
          ${!canEdit()?'disabled':''}
        >
      </div>

      <div class="field">
        <label>Vencimiento</label>
        <input id="odue" type="date" value="${o?.due_date||''}" ${!canEdit()?'disabled':''}>
      </div>
    </div>

    ${priorCandidates.length&&!sourceLink?`
      <div class="consolidation-box">
        <strong>¿Cómo debe tratarse esta factura?</strong>
        <div class="consolidation-options">
          <label class="consolidation-option">
            <input type="radio" name="invoiceMode" value="additional" ${currentMode==='additional'?'checked':''}>
            <span>
              <strong>Factura adicional</strong><br>
              <small>Se suma completa a las deudas anteriores.</small>
            </span>
          </label>

          <label class="consolidation-option">
            <input type="radio" name="invoiceMode" value="consolidated" ${currentMode==='consolidated'?'checked':''}>
            <span>
              <strong>Esta factura incluye deuda anterior</strong><br>
              <small>Elegí qué facturas anteriores ya están contenidas en este total.</small>
            </span>
          </label>
        </div>

        <div id="consolidationDebts" class="consolidation-debts ${currentMode==='consolidated'?'':'hidden'}">
          ${priorCandidates.map(item=>`
            <label class="consolidation-debt">
              <input
                type="checkbox"
                data-consolidation-source="${item.id}"
                ${currentSourceIds.includes(item.id)?'checked':''}
              >
              <span>
                <strong>${monthLabel(item.period.slice(0,7))}</strong><br>
                <small>Vencía ${fmtDate(item.due_date)} · saldo ${fmtMoney(balanceFor(item))}</small>
              </span>
              <strong>${fmtMoney(item.amount)}</strong>
            </label>
          `).join('')}

          <div id="consolidationSummary" class="consolidation-summary"></div>
        </div>
      </div>`:''}

    <div class="field">
      <label>Archivo de factura <span style="font-weight:400;text-transform:none">(opcional)</span></label>
      <input id="invoiceFile" type="file" accept="image/jpeg,image/png,image/webp,application/pdf" ${!canEdit()?'disabled':''}>
      <div style="font-size:12px;color:var(--muted);margin-top:6px">
        Primero seleccioná el archivo. Después presioná <strong>Agregar factura</strong>.
        PDF, JPG, PNG o WEBP. Máximo 10 MB.
      </div>
      <div id="invoiceLocalPreview" class="local-preview hidden"></div>
    </div>

    <div class="document-group">
      <h3>Facturas del servicio</h3>
      <p>${existingInvoices.length
        ? 'Podés abrirlas en tamaño completo o quitar una cargada por error.'
        : 'Todavía no hay una factura adjunta.'}</p>

      ${existingInvoices.length?`
        <div class="document-gallery">
          ${existingInvoices.map((document,index)=>
            documentCard(document,`Factura ${index+1}`,canDelete())
          ).join('')}
        </div>`:''}
    </div>

    ${o&&paymentRows.length?`
      <div class="document-group">
        <h3>Pagos registrados</h3>
        <p>Podés abrir cada pago, cargar comprobantes o anular un pago parcial específico.</p>
        ${paymentRows.map((payment,index)=>{
          const receipts=receiptsForPayment(payment.id);
          return `<div class="folderitem">
            <div class="folderhead">
              <div>
                <strong>Pago ${paymentRows.length-index}</strong>
                <div>${fmtDate(payment.paid_at)} · ${fmtMoney(payment.total_amount)}</div>
              </div>
              <button class="btn soft small" data-payment-detail="${payment.id}">Abrir pago</button>
            </div>
            ${receipts.length?`
              <div class="document-gallery" style="margin-top:10px">
                ${receipts.map((document,receiptIndex)=>
                  documentCard(document,`Comprobante ${receiptIndex+1}`,canDelete())
                ).join('')}
              </div>`:'<small>Sin comprobante adjunto.</small>'}
          </div>`;
        }).join('')}
      </div>`:''}

    <div class="field">
      <label>Notas</label>
      <textarea id="onotes" ${!canEdit()?'disabled':''}>${esc(o?.notes||'')}</textarea>
    </div>

    <div class="modalactions">
      <button class="btn outline" data-close>Cerrar</button>

      ${sourceLink&&target
        ? `<button class="btn soft" id="openConsolidatedTarget">Abrir ${monthLabel(target.period.slice(0,7))}</button>`
        : ''}

      ${canDelete()&&o
        ? `<button class="btn danger" id="deleteMonthData">Borrar datos del mes</button>`
        : ''}

      ${canEdit()?`
        <button class="btn soft" id="saveObligation">Guardar cambios</button>
        <button class="btn primary" id="addInvoiceButton">Agregar factura</button>
        ${o&&!sourceLink&&progress.balance>0.01?'<button class="btn primary" id="markPaid">Registrar pago</button>':''}
      `:''}
    </div>`);

  bindMoneyInputs();

  document.querySelectorAll('[data-payment-detail]').forEach(button=>{
    button.onclick=()=>openPaymentDetail(button.dataset.paymentDetail);
  });

  if(document.getElementById('openConsolidatedTarget')){
    document.getElementById('openConsolidatedTarget').onclick=()=>{
      openObligation(serviceId,target.period.slice(0,7));
    };
  }

  const invoiceInput=document.getElementById('invoiceFile');
  const localPreview=document.getElementById('invoiceLocalPreview');
  const addInvoiceButton=document.getElementById('addInvoiceButton');

  if(invoiceInput){
    invoiceInput.onchange=()=>{
      renderLocalFilePreview(
        invoiceInput,
        localPreview,
        'Vista previa antes de guardar'
      );
      if(addInvoiceButton){
        addInvoiceButton.textContent=invoiceInput.files[0]
          ? 'Guardar factura'
          : 'Agregar factura';
      }
    };
  }

  const updateConsolidationUI=()=>{
    const mode=document.querySelector('input[name="invoiceMode"]:checked')?.value||'additional';
    const debtsBox=document.getElementById('consolidationDebts');
    if(debtsBox)debtsBox.classList.toggle('hidden',mode!=='consolidated');

    const selected=[...document.querySelectorAll('[data-consolidation-source]:checked')]
      .map(input=>obligations.find(item=>item.id===input.dataset.consolidationSource))
      .filter(Boolean);
    const includedTotal=selected.reduce((sum,item)=>sum+balanceFor(item),0);
    const invoiceTotal=parseMoneyField(document.getElementById('oamount')?.value||0);
    const newPeriodAmount=Math.max(0,invoiceTotal-includedTotal);
    const summary=document.getElementById('consolidationSummary');

    if(summary){
      summary.innerHTML=mode==='consolidated'
        ? `Saldos anteriores incluidos: <strong>${fmtMoney(includedTotal)}</strong><br>
           Total exigible de esta factura: <strong>${fmtMoney(invoiceTotal)}</strong><br>
           Importe nuevo estimado del período: <strong>${fmtMoney(newPeriodAmount)}</strong>`
        : `Esta factura se sumará completa a las deudas anteriores.`;
    }
  };

  document.querySelectorAll('input[name="invoiceMode"],[data-consolidation-source]').forEach(input=>{
    input.onchange=updateConsolidationUI;
  });
  document.getElementById('oamount')?.addEventListener('input',updateConsolidationUI);
  updateConsolidationUI();

  bindDocumentCards({
    onDelete:()=>openObligation(serviceId,key)
  });

  if(!canEdit())return;

  async function saveMonthData({uploadInvoice=false}={}){
    const amountValue=parseMoneyField(document.getElementById('oamount').value);
    const dueValue=document.getElementById('odue').value;
    const file=invoiceInput?.files?.[0]||null;
    const mode=document.querySelector('input[name="invoiceMode"]:checked')?.value||'additional';
    const selectedSourceIds=mode==='consolidated'
      ? [...document.querySelectorAll('[data-consolidation-source]:checked')]
          .map(input=>input.dataset.consolidationSource)
      : [];

    if(amountValue<=0||!dueValue){
      throw new Error('Completá importe y vencimiento');
    }

    if(uploadInvoice&&!file){
      invoiceInput.click();
      return null;
    }

    if(file&&file.size>10*1024*1024){
      throw new Error('La factura supera el límite de 10 MB');
    }

    if(mode==='consolidated'&&!selectedSourceIds.length){
      throw new Error('Elegí al menos una deuda anterior incluida');
    }

    const selectedTotal=selectedSourceIds
      .map(id=>obligations.find(item=>item.id===id))
      .filter(Boolean)
      .reduce((sum,item)=>sum+balanceFor(item),0);

    if(mode==='consolidated'&&amountValue<selectedTotal){
      throw new Error('El total de la nueva factura no puede ser menor que los saldos incluidos');
    }

    const period=periodDate(key);
    const payload={
      service_id:serviceId,
      period,
      amount:amountValue,
      due_date:dueValue,
      status:o?.status||'pending',
      notes:document.getElementById('onotes').value,
      created_by:session.user.id
    };

    const {data:saved,error}=await sb
      .from('obligations')
      .upsert(payload,{onConflict:'service_id,period'})
      .select()
      .single();

    if(error)throw error;

    const {error:deleteLinkError}=await sb
      .from('obligation_consolidations')
      .delete()
      .eq('target_obligation_id',saved.id);

    if(deleteLinkError)throw deleteLinkError;

    if(mode==='consolidated'&&selectedSourceIds.length){
      const {error:insertLinkError}=await sb
        .from('obligation_consolidations')
        .insert(selectedSourceIds.map(sourceId=>({
          source_obligation_id:sourceId,
          target_obligation_id:saved.id,
          created_by:session.user.id
        })));

      if(insertLinkError)throw insertLinkError;
    }

    if(uploadInvoice&&file){
      await uploadDoc(file,serviceId,saved.id,null,'invoice');
    }

    await syncObligationStatus(saved.id);
    return saved;
  }

  const saveButton=document.getElementById('saveObligation');
  saveButton.onclick=async()=>{
    const original=saveButton.textContent;
    saveButton.disabled=true;
    saveButton.textContent='Guardando…';

    try{
      await saveMonthData({uploadInvoice:false});
      closeModal();
      await reloadGroup();
      renderApp();
      toast('Cambios guardados');
    }catch(err){
      console.error('Error guardando cambios:',err);
      const message=String(err?.message||'');
      toast(
        message.includes('duplicate key')||message.includes('23505')
          ? 'Una de las deudas seleccionadas ya está incluida en otra factura'
          : message||'No se pudieron guardar los cambios'
      );
    }finally{
      if(document.getElementById('saveObligation')){
        saveButton.disabled=false;
        saveButton.textContent=original;
      }
    }
  };

  addInvoiceButton.onclick=async()=>{
    if(!invoiceInput.files[0]){
      invoiceInput.click();
      return;
    }

    const original=addInvoiceButton.textContent;
    addInvoiceButton.disabled=true;
    addInvoiceButton.textContent='Subiendo…';

    try{
      await saveMonthData({uploadInvoice:true});
      closeModal();
      await reloadGroup();
      renderApp();
      toast('Factura agregada');
    }catch(err){
      console.error('Error agregando factura:',err);
      const message=String(err?.message||'');
      toast(
        message.includes('duplicate key')||message.includes('23505')
          ? 'Una de las deudas seleccionadas ya está incluida en otra factura'
          : message||'No se pudo agregar la factura'
      );
    }finally{
      if(document.getElementById('addInvoiceButton')){
        addInvoiceButton.disabled=false;
        addInvoiceButton.textContent=original;
      }
    }
  };

  if(document.getElementById('deleteMonthData')){
    document.getElementById('deleteMonthData').onclick=()=>{
      deleteObligationMonth(o.id,serviceId,key);
    };
  }

  if(o&&!sourceLink&&progress.balance>0.01){
    document.getElementById('markPaid').onclick=()=>openPayModal(o);
  }
}

async function deleteObligationMonth(obligationId,serviceId,key){
  if(!canDelete())return toast('No tenés permiso para borrar esta carga');

  const obligation=obligations.find(item=>item.id===obligationId);
  if(!obligation)return toast('No se encontró la carga del mes');

  const obligationPayments=paymentsFor(obligationId);
  const paymentIds=obligationPayments.map(payment=>payment.id);
  const invoiceDocs=documents.filter(item=>item.obligation_id===obligationId);
  const receiptDocs=documents.filter(item=>paymentIds.includes(item.payment_id));
  const allDocs=[...invoiceDocs,...receiptDocs];
  const sourceLink=consolidationForSource(obligationId);
  const targetLinks=consolidationsForTarget(obligationId);

  const consequences=[
    `${monthLabel(key)} de ${services.find(item=>item.id===serviceId)?.name||'este servicio'}`,
    invoiceDocs.length
      ? `${invoiceDocs.length} factura${invoiceDocs.length===1?'':'s'}`
      : null,
    obligationPayments.length
      ? `${obligationPayments.length} pago${obligationPayments.length===1?'':'s'} registrado${obligationPayments.length===1?'':'s'} y sus aportes`
      : null,
    receiptDocs.length
      ? `${receiptDocs.length} comprobante${receiptDocs.length===1?'':'s'} de pago`
      : null,
    sourceLink
      ? 'la relación con la factura que incluía esta deuda'
      : null,
    targetLinks.length
      ? `${targetLinks.length} deuda${targetLinks.length===1?'':'s'} anterior${targetLinks.length===1?'':'es'} volverá${targetLinks.length===1?'':'n'} a quedar pendiente${targetLinks.length===1?'':'s'}`
      : null
  ].filter(Boolean);

  const confirmed=confirm(
    `¿Borrar todos los datos de este mes?\n\nSe eliminará:\n• ${consequences.join('\n• ')}\n\nEl servicio seguirá existiendo en los demás meses. Esta acción no se puede deshacer.`
  );

  if(!confirmed)return;

  try{
    const paths=allDocs.map(item=>item.file_path).filter(Boolean);

    const {error}=await sb
      .from('obligations')
      .delete()
      .eq('id',obligationId);

    if(error)throw error;

    if(paths.length){
      const {error:storageError}=await sb.storage
        .from('documents')
        .remove(paths);

      if(storageError){
        console.warn('La carga se borró, pero quedaron archivos físicos:',storageError.message);
      }
    }

    closeModal();
    await reloadGroup();
    renderApp();
    toast('Datos del mes borrados');
  }catch(err){
    console.error('Error borrando datos del mes:',err);
    toast(err?.message||'No se pudieron borrar los datos del mes');
  }
}

function openPayModal(o){
  const progress=paymentProgress(o);

  if(progress.balance<=0.01){
    const last=paymentFor(o.id);
    toast('Esta factura ya está abonada');
    if(last)return openPaymentDetail(last.id);
    return;
  }

  const active=members.filter(m=>Number(m.participation_percent)>0);
  const defaults={};
  let left=progress.balance;

  active.forEach((m,i)=>{
    const value=i===active.length-1
      ? left
      : Math.round(progress.balance*Number(m.participation_percent||0)/100);
    defaults[m.id]=value;
    left-=value;
  });

  modal(`<h2>Registrar pago</h2>
    <div class="sub">
      Podés registrar un pago parcial o cancelar el saldo completo de esta factura.
    </div>

    <div class="payment-summary">
      <div class="item"><span>Total factura</span><strong>${fmtMoney(progress.amount)}</strong></div>
      <div class="item"><span>Pagado</span><strong>${fmtMoney(progress.paid)}</strong></div>
      <div class="item"><span>Saldo a pagar</span><strong>${fmtMoney(progress.balance)}</strong></div>
    </div>

    <div class="grid2">
      <div class="field">
        <label>Fecha</label>
        <input id="paidDate" type="date" value="${new Date().toISOString().slice(0,10)}">
      </div>

      <div class="field">
        <label>Total de este pago</label>
        <input id="paidTotal" data-money-input class="money-input" value="${formatMoneyField(progress.balance||0)}">
      </div>
    </div>

    ${active.map(m=>`
      <div class="field">
        <label>${esc(m.display_name)} aportó</label>
        <input
          data-contrib="${m.id}"
          data-money-input
          class="money-input"
          value="${formatMoneyField(defaults[m.id]||0)}"
        >
      </div>
    `).join('')}

    <div class="field">
      <label>Comprobante</label>
      <input id="receiptFile" type="file" accept="image/jpeg,image/png,image/webp,application/pdf">
      <div id="receiptLocalPreview" class="local-preview hidden"></div>
    </div>

    <div class="modalactions">
      <button class="btn outline" data-close>Cancelar</button>
      <button class="btn primary" id="savePay">Registrar pago</button>
    </div>`);

  bindMoneyInputs();

  function distributePaymentContributions(totalValue){
    let remaining=Number(totalValue||0);

    active.forEach((member,index)=>{
      const input=document.querySelector(`[data-contrib="${member.id}"]`);
      if(!input)return;

      const value=index===active.length-1
        ? remaining
        : Math.round(Number(totalValue||0)*Number(member.participation_percent||0)/100);

      input.value=formatMoneyField(Math.max(0,value));
      remaining-=value;
    });
  }

  const paidTotalInput=document.getElementById('paidTotal');
  paidTotalInput.addEventListener('input',()=>{
    distributePaymentContributions(parseMoneyField(paidTotalInput.value));
  });
  paidTotalInput.addEventListener('blur',()=>{
    distributePaymentContributions(parseMoneyField(paidTotalInput.value));
  });

  const receiptInput=document.getElementById('receiptFile');
  receiptInput.onchange=()=>renderLocalFilePreview(
    receiptInput,
    document.getElementById('receiptLocalPreview'),
    'Vista previa del comprobante'
  );

  document.getElementById('savePay').onclick=async()=>{
    const values=[...document.querySelectorAll('[data-contrib]')].map(input=>({
      membership_id:input.dataset.contrib,
      amount:parseMoneyField(input.value)
    }));

    const sum=values.reduce((total,item)=>total+item.amount,0);
    const total=parseMoneyField(document.getElementById('paidTotal').value);

    if(total<=0)return toast('Ingresá el total pagado');
    if(total>progress.balance+.01)return toast('El pago no puede superar el saldo pendiente');
    if(Math.abs(sum-total)>.01)return toast('Los aportes deben sumar el total pagado');

    const saveButton=document.getElementById('savePay');
    const original=saveButton.textContent;
    saveButton.disabled=true;
    saveButton.textContent='Registrando…';

    let createdPaymentId=null;

    try{
      const {data:payment,error}=await sb
        .from('payments')
        .insert({
          obligation_id:o.id,
          paid_at:document.getElementById('paidDate').value,
          total_amount:total,
          created_by:session.user.id
        })
        .select()
        .single();

      if(error)throw error;
      createdPaymentId=payment.id;

      const contributionResult=await sb
        .from('payment_contributions')
        .insert(values.map(item=>({...item,payment_id:payment.id})));

      if(contributionResult.error)throw contributionResult.error;

      if(receiptInput.files[0]){
        await uploadDoc(
          receiptInput.files[0],
          o.service_id,
          o.id,
          payment.id,
          'receipt'
        );
      }

      await syncObligationStatus(o.id);

      createdPaymentId=null;
      closeModal();
      await reloadGroup();
      renderApp();
      toast(total>=progress.balance-.01?'Factura abonada':'Pago parcial registrado');
    }catch(err){
      console.error('Error registrando pago:',err);

      if(createdPaymentId){
        await sb.from('payments').delete().eq('id',createdPaymentId);
        await syncObligationStatus(o.id);
      }

      const message=String(err?.message||'');
      toast(message||'No se pudo registrar el pago');
    }finally{
      if(document.getElementById('savePay')){
        saveButton.disabled=false;
        saveButton.textContent=original;
      }
    }
  };
}
