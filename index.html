<body>
<div id="app"></div>
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>
<script>
const STORE_KEY='gestor-gastos-v3';
const SESSION_KEY='gestor-gastos-session';
const MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const CATEGORIES={
  luz:{label:'Luz',abbr:'LUZ',kind:'servicio'},
  gas:{label:'Gas',abbr:'GAS',kind:'servicio'},
  agua:{label:'Agua',abbr:'AGUA',kind:'servicio'},
  internet:{label:'Internet',abbr:'NET',kind:'servicio'},
  alquiler:{label:'Alquiler / Expensas',abbr:'ALQ',kind:'servicio'},
  otro:{label:'Otro servicio',abbr:'OTR',kind:'servicio'},
  arca:{label:'ARCA',abbr:'ARCA',kind:'impuesto'},
  iva:{label:'IVA',abbr:'IVA',kind:'impuesto'},
  iibb:{label:'Ingresos Brutos',abbr:'IIBB',kind:'impuesto'},
  moratoria:{label:'Moratoria',abbr:'MOR',kind:'impuesto'},
  otro_impuesto:{label:'Otro impuesto',abbr:'IMP',kind:'impuesto'}
};

let state=loadState();
let session=loadSession();
let activeTab='obligaciones';
let selectedMonth=currentMonthKey();
let setupChoice=null;
normalizeSession();

function initialState(){return{workspace:null,members:[],services:[],records:[]}}
function normalizeState(saved){
  const next=saved||initialState();
  next.services=next.services||[];
  next.records=next.records||[];
  next.members=next.members||[];
  if(next.workspace&&!next.workspace.type)next.workspace.type='family';
  if(next.workspace&&!next.members.length){
    const adminPin=next.workspace.adminPin||'1234';
    const viewerPin=next.workspace.viewerPin||'0000';
    next.members=next.workspace.type==='company' ? [
      {id:uid(),name:'Responsable 1',role:'admin',share:50,pin:adminPin},
      {id:uid(),name:'Responsable 2',role:'admin',share:50,pin:adminPin},
      {id:uid(),name:'Observador',role:'viewer',share:0,pin:viewerPin}
    ] : [
      {id:uid(),name:'Adulto 1',role:'admin',share:50,pin:adminPin},
      {id:uid(),name:'Adulto 2',role:'admin',share:50,pin:adminPin},
      {id:uid(),name:'Niño/a 1',role:'viewer',share:0,pin:viewerPin},
      {id:uid(),name:'Niño/a 2',role:'viewer',share:0,pin:viewerPin}
    ];
  }
  next.members.forEach(member=>{
    member.role=member.role==='viewer'?'viewer':'admin';
    member.share=member.role==='admin'?Number(member.share||0):0;
    member.pin=String(member.pin||'');
  });
  return next;
}
function loadState(){
  try{
    const saved=JSON.parse(localStorage.getItem(STORE_KEY));
    return normalizeState(saved);
  }catch(e){return initialState()}
}
function saveState(){localStorage.setItem(STORE_KEY,JSON.stringify(state))}
function loadSession(){try{return JSON.parse(sessionStorage.getItem(SESSION_KEY))||null}catch(e){return null}}
function saveSession(value){session=value;sessionStorage.setItem(SESSION_KEY,JSON.stringify(value))}
function normalizeSession(){
  if(!session||session.memberId||!state.members?.length)return;
  const member=state.members.find(m=>m.role===session.role)||state.members[0];
  if(member)saveSession({memberId:member.id,role:member.role,name:member.name});
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function canEdit(){return session&&session.role==='admin'}
function memberById(id){return state.members.find(m=>m.id===id)}
function admins(){return state.members.filter(m=>m.role==='admin')}
function contributors(){return admins().filter(m=>Number(m.share)>0)}
function workspaceType(){return state.workspace?.type==='company'?'company':'family'}
function isCompany(){return workspaceType()==='company'}
function workspaceMark(){return isCompany()?'E':'F'}
function workspaceKindLabel(){return isCompany()?'Empresa':'Grupo familiar'}
function groupButtonLabel(){return isCompany()?'Equipo':'Familia'}
function groupTitle(){return isCompany()?'Equipo y accesos':'Familia y accesos'}
function groupUpdatedLabel(){return isCompany()?'Equipo actualizado':'Familia actualizada'}
function balanceTitle(){return isCompany()?'Equilibrio del equipo':'Equilibrio familiar'}
function controlSubtitle(){return isCompany()?'Control compartido de gastos de la empresa':'Control familiar de gastos'}
function setupMembersFor(type){
  return type==='company' ? [
    {id:uid(),name:'Responsable 1',role:'admin',share:50,pin:''},
    {id:uid(),name:'Responsable 2',role:'admin',share:50,pin:''},
    {id:uid(),name:'Observador',role:'viewer',share:0,pin:''}
  ] : [
    {id:uid(),name:'Adulto 1',role:'admin',share:50,pin:''},
    {id:uid(),name:'Adulto 2',role:'admin',share:50,pin:''},
    {id:uid(),name:'Niño/a 1',role:'viewer',share:0,pin:''},
    {id:uid(),name:'Niño/a 2',role:'viewer',share:0,pin:''}
  ];
}
function serviceById(id){return state.services.find(s=>s.id===id)}
function categoryOf(service){return CATEGORIES[service?.category]||CATEGORIES.otro}
function currentMonthKey(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function monthLabel(key){if(!key)return 'Pago puntual';const [y,m]=String(key).split('-');return `${MONTHS[Number(m)-1]||''} ${y}`.trim()}
function capitalizedMonth(key){const value=monthLabel(key);return value.charAt(0).toUpperCase()+value.slice(1)}
function shiftMonth(key,delta){const [y,m]=String(key).split('-').map(Number),d=new Date(y,m-1+delta,1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function recordsForServiceMonth(serviceId,key){return state.records.filter(r=>r.serviceId===serviceId&&r.period===key&&r.recordType!=='puntual'&&r.recordType!=='moratoria').sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))}
function monthlyOverview(key){
  return state.services.filter(s=>s.recurring).map(service=>{
    const records=recordsForServiceMonth(service.id,key),record=records[0]||null;
    let status='missing';
    if(record){status=record.status==='pagado'?'paid':(relevantDue(record).days!==null&&relevantDue(record).days<0?'overdue':'loaded')}
    return{service,record,status};
  }).sort((a,b)=>{
    const order={missing:0,overdue:1,loaded:2,paid:3};
    return order[a.status]-order[b.status]||a.service.name.localeCompare(b.service.name,'es');
  });
}
function fmtMoney(value){if(value===null||value===undefined||value==='')return '—';return Number(value).toLocaleString('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0})}
function fmtDate(value){if(!value)return '—';const d=parseDate(value);return d.toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'})}
function parseDate(value){const [y,m,d]=String(value).split('-').map(Number);return new Date(y,m-1,d)}
function todayStart(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate())}
function daysUntil(value){if(!value)return null;return Math.round((parseDate(value)-todayStart())/86400000)}
function escapeHtml(value){return String(value??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function showToast(text){const el=document.getElementById('toast');el.textContent=text;el.classList.add('show');clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>el.classList.remove('show'),2200)}
function roundMoney(value){return Math.round((Number(value)||0)*100)/100}

function recordTitle(record){const service=serviceById(record.serviceId);return record.title?.trim()||service?.name||'Concepto eliminado'}
function recordKindLabel(record){const service=serviceById(record.serviceId);if(service?.category==='moratoria'||record.recordType==='moratoria')return 'Moratoria';return categoryOf(service).kind==='impuesto'?'Impuesto':'Servicio'}
function relevantDue(record){
  const d1=record.facturaDate||null,d2=record.facturaDate2||null;
  const days1=daysUntil(d1),days2=daysUntil(d2);
  if(d1&&days1>=0)return{date:d1,days:days1,amount:Number(record.facturaAmount||0),stage:'1° vencimiento'};
  if(d2&&days2>=0)return{date:d2,days:days2,amount:Number(record.facturaAmount2||record.facturaAmount||0),stage:'2° vencimiento'};
  if(d2)return{date:d2,days:days2,amount:Number(record.facturaAmount2||record.facturaAmount||0),stage:'2° vencimiento'};
  if(d1)return{date:d1,days:days1,amount:Number(record.facturaAmount||0),stage:'Vencimiento'};
  return{date:null,days:null,amount:Number(record.facturaAmount||0),stage:'Sin fecha'};
}
function toneForDays(days){if(days===null)return'nodate';if(days<0)return'overdue';if(days<=2)return'urgent';if(days<=5)return'warning';if(days<=10)return'safe';return'far'}
function dueLabel(meta){
  if(meta.days===null)return'Sin fecha de vencimiento';
  if(meta.days<0)return`Vencido hace ${Math.abs(meta.days)} día${Math.abs(meta.days)===1?'':'s'}`;
  if(meta.days===0)return'Vence hoy';
  if(meta.days===1)return'Vence mañana';
  if(meta.days<=5)return`Faltan ${meta.days} días`;
  return`Vence en ${meta.days} días`;
}
function pendingRecords(){
  return state.records.filter(r=>r.status!=='pagado').sort((a,b)=>{
    const ma=relevantDue(a),mb=relevantDue(b);
    const ra=ma.days===null?3:(ma.days<0?0:1),rb=mb.days===null?3:(mb.days<0?0:1);
    if(ra!==rb)return ra-rb;
    if(ma.days!==mb.days)return (ma.days??99999)-(mb.days??99999);
    return mb.amount-ma.amount;
  });
}
function paidRecords(){return state.records.filter(r=>r.status==='pagado').sort((a,b)=>(b.paidAt||0)-(a.paidAt||0))}
function currentAmount(record){return relevantDue(record).amount}
function paymentAmount(record){return Number(record.comprobanteAmount||record.facturaAmount||0)}

function defaultShares(){
  const list=contributors();
  const total=list.reduce((sum,m)=>sum+Number(m.share||0),0);
  const out={};
  if(!list.length)return out;
  list.forEach((m,index)=>out[m.id]=index===list.length-1?roundMoney(100-Object.values(out).reduce((a,b)=>a+b,0)):roundMoney(total?Number(m.share||0)*100/total:100/list.length));
  return out;
}
function recordShares(record){
  const raw=record?.shares&&typeof record.shares==='object'?record.shares:null;
  if(!raw||!Object.values(raw).some(v=>Number(v)>0))return defaultShares();
  const cleaned={};
  Object.entries(raw).forEach(([id,val])=>{if(memberById(id)&&Number(val)>=0)cleaned[id]=Number(val)});
  return Object.values(cleaned).some(v=>v>0)?cleaned:defaultShares();
}
function recordPayments(record){
  if(record?.payments&&typeof record.payments==='object'){
    const out={};Object.entries(record.payments).forEach(([id,val])=>{if(memberById(id)&&Number(val)>0)out[id]=Number(val)});return out;
  }
  if(record?.payerId&&memberById(record.payerId))return{[record.payerId]:paymentAmount(record)};
  return{};
}
function sumObject(obj){return Object.values(obj||{}).reduce((sum,val)=>sum+Number(val||0),0)}
function sharesLabel(record){
  const shares=recordShares(record);
  const parts=contributors().filter(m=>Number(shares[m.id]||0)>0).map(m=>`${Math.round(Number(shares[m.id]))}%`);
  return parts.length?parts.join(' / '):'Sin reparto';
}
function sharesText(record){
  const shares=recordShares(record);
  return contributors().filter(m=>Number(shares[m.id]||0)>0).map(m=>`${m.name}: ${Number(shares[m.id]).toLocaleString('es-AR',{maximumFractionDigits:2})}%`).join(' · ')||'Sin reparto configurado';
}
function paidByText(record){
  const payments=recordPayments(record);
  const parts=Object.entries(payments).filter(([,v])=>Number(v)>0).map(([id,val])=>`${memberById(id)?.name||'Integrante'} ${fmtMoney(val)}`);
  return parts.length?parts.join(' · '):'Pagador sin asignar';
}
function paymentIsComplete(record){
  const amount=paymentAmount(record),total=sumObject(recordPayments(record));
  return amount>0&&Math.abs(total-amount)<=1;
}
function balanceData(records=paidRecords()){
  const list=contributors();
  const rows={};
  list.forEach(m=>rows[m.id]={member:m,paid:0,owed:0,balance:0});
  let totalExpenses=0,unassigned=0,usedRecords=0;
  records.forEach(record=>{
    const amount=paymentAmount(record);
    if(!amount)return;
    const payments=recordPayments(record),paidTotal=sumObject(payments);
    if(!Object.keys(payments).length||Math.abs(paidTotal-amount)>1){unassigned++;return}
    const shares=recordShares(record),shareTotal=sumObject(shares);
    if(!shareTotal){unassigned++;return}
    usedRecords++;totalExpenses+=amount;
    list.forEach(member=>{
      rows[member.id].paid+=Number(payments[member.id]||0);
      rows[member.id].owed+=amount*(Number(shares[member.id]||0)/shareTotal);
    });
  });
  Object.values(rows).forEach(row=>row.balance=roundMoney(row.paid-row.owed));
  const balanced=Object.values(rows).every(row=>Math.abs(row.balance)<1);
  return{rows:Object.values(rows),totalExpenses,unassigned,usedRecords,balanced};
}
function settlements(balance){
  const creditors=balance.rows.filter(r=>r.balance>1).map(r=>({...r,remaining:r.balance}));
  const debtors=balance.rows.filter(r=>r.balance<-1).map(r=>({...r,remaining:-r.balance}));
  const result=[];let i=0,j=0;
  while(i<debtors.length&&j<creditors.length){
    const amount=Math.min(debtors[i].remaining,creditors[j].remaining);
    if(amount>1)result.push({from:debtors[i].member,to:creditors[j].member,amount:roundMoney(amount)});
    debtors[i].remaining-=amount;creditors[j].remaining-=amount;
    if(debtors[i].remaining<1)i++;if(creditors[j].remaining<1)j++;
  }
  return result;
}
function balanceClass(value){return value>1?'positive':value<-1?'negative':'neutral'}
function signedMoney(value){if(Math.abs(Number(value)||0)<1)return fmtMoney(0);return `${value>0?'+':'−'}${fmtMoney(Math.abs(value))}`}
function recordMonth(record){return record.period||(record.comprobanteDate?record.comprobanteDate.slice(0,7):currentMonthKey())}
function monthlyBalances(){
  const groups={};
  paidRecords().forEach(record=>{const key=recordMonth(record);(groups[key]||(groups[key]=[])).push(record)});
  return Object.keys(groups).sort().reverse().map(key=>({key,balance:balanceData(groups[key])}));
}

function render(){if(!state.workspace){renderSetup();return}if(!session){renderLogin();return}renderApp()}
function renderSetup(){
  if(!setupChoice){
    document.getElementById('app').innerHTML=`<div class="login-wrap"><div class="login-card setup-card"><div class="logo"><div class="logo-mark">G</div><div><strong>Gestor de gastos</strong><span>Configuración inicial</span></div></div><h1>¿Cómo se va a usar?</h1><p>Primero elegí el tipo de espacio. Después configurás quiénes participan, quiénes pueden administrar y cómo se reparten los gastos.</p><div class="workspace-options"><button class="workspace-option" data-workspace-type="family"><div class="workspace-option-icon">⌂</div><strong>Grupo familiar</strong><span>Para adultos, hijos u otros integrantes. Permite repartir gastos y arrastrar saldos a favor entre meses.</span></button><button class="workspace-option" data-workspace-type="company"><div class="workspace-option-icon">▦</div><strong>Empresa</strong><span>Para socios, responsables o áreas. Permite definir porcentajes de aporte y usuarios de solo consulta.</span></button></div><div class="login-note">En ambos casos, los administradores pueden cargar y abonar gastos. Los usuarios de consulta solo pueden observar.</div></div></div>`;
    document.querySelectorAll('[data-workspace-type]').forEach(btn=>btn.onclick=()=>{setupChoice=btn.dataset.workspaceType;renderSetup()});
    return;
  }
  const type=setupChoice;
  const company=type==='company';
  const members=setupMembersFor(type);
  document.getElementById('app').innerHTML=`<div class="login-wrap"><div class="login-card setup-card"><div class="logo"><div class="logo-mark">${company?'E':'F'}</div><div><strong>${company?'Configurar empresa':'Configurar grupo familiar'}</strong><span>Integrantes, permisos y reparto</span></div></div><div class="setup-type-head"><div><strong>${company?'Empresa':'Grupo familiar'}</strong><span>${company?'Socios, responsables, colaboradores y observadores.':'Adultos, hijos y otros integrantes del hogar.'}</span></div><span class="type-chip">Paso 2 de 2</span></div><div class="field"><label>Nombre del espacio</label><input id="setupName" placeholder="${company?'Ej: Administración Mi Empresa':'Ej: Gastos de la familia'}"></div><div class="setup-members" id="setupMembers">${members.map(memberRow).join('')}</div><button class="btn soft small" id="addSetupMember">+ Agregar integrante</button><div class="balance-warning family-note">Los administradores con participación son quienes aportan. Sus porcentajes deben sumar 100%. Los usuarios de consulta llevan 0%.</div><div class="modal-actions"><button class="btn outline" id="backSetup">Volver</button><button class="btn primary" id="createWorkspace">Crear ${company?'empresa':'grupo familiar'}</button></div></div></div>`;
  bindMemberRows();

function paymentBlock(payments,amount,newRecord){
  const list=admins();
  return `<div class="field full"><label>Quién aportó el dinero</label><div class="split-editor payment-editor">${list.map(m=>{let value=Number(payments[m.id]||0);if(newRecord&&!Object.keys(payments).length&&m.id===session.memberId)value=amount;return `<div class="split-row"><span>${escapeHtml(m.name)}</span><div class="money-input"><b>$</b><input type="number" min="0" step="0.01" data-payment-member="${m.id}" value="${value||''}" placeholder="0"></div></div>`}).join('')}<div class="split-total">Total aportado <strong id="paymentTotal">${fmtMoney(0)}</strong></div></div><div class="hint">Puede pagar una sola persona o dividirse el pago entre varios administradores.</div></div>`;
}
function bindPaymentEditor(){
  const inputs=[...document.querySelectorAll('[data-payment-member]')],total=document.getElementById('paymentTotal');
  const update=()=>{const value=inputs.reduce((sum,input)=>sum+Number(input.value||0),0);if(total)total.textContent=fmtMoney(value)};
  inputs.forEach(input=>input.oninput=update);update();
}
function readPayments(expected){
  const result={};document.querySelectorAll('[data-payment-member]').forEach(input=>{const value=Number(input.value||0);if(value>0)result[input.dataset.paymentMember]=value});
  const total=sumObject(result);if(!total){showToast('Indicá quién aportó el pago');return null}if(Math.abs(total-expected)>1){showToast(`Los aportes deben sumar ${fmtMoney(expected)}`);return null}return result;
}

function breakdownShares(record,amount){const shares=recordShares(record),total=sumObject(shares);return contributors().filter(m=>Number(shares[m.id]||0)>0).map(m=>`<div><span>${escapeHtml(m.name)} · ${Number(shares[m.id]).toLocaleString('es-AR',{maximumFractionDigits:2})}%</span><strong>${fmtMoney(amount*(Number(shares[m.id]||0)/total))}</strong></div>`).join('')}
function breakdownPayments(record){const payments=recordPayments(record);return Object.entries(payments).map(([id,val])=>`<div><span>${escapeHtml(memberById(id)?.name||'Integrante')}</span><strong>${fmtMoney(val)}</strong></div>`).join('')||'<div><span>Sin asignar</span><strong>—</strong></div>'}

function openServiceDetail(serviceId){
  const service=serviceById(serviceId);if(!service)return;
  const records=state.records.filter(r=>r.serviceId===serviceId).sort((a,b)=>String(b.period||b.facturaDate||'').localeCompare(String(a.period||a.facturaDate||''))||(b.createdAt||0)-(a.createdAt||0));
  const paid=records.filter(r=>r.status==='pagado'),pending=records.filter(r=>r.status!=='pagado'),paidTotal=paid.reduce((sum,r)=>sum+paymentAmount(r),0),debtTotal=pending.reduce((sum,r)=>sum+currentAmount(r),0);
  const rows=records.map(r=>{const isPaid=r.status==='pagado',meta=relevantDue(r),status=isPaid?'Abonado':meta.days!==null&&meta.days<0?'Vencido':'Pendiente';return `<div class="folder-record" data-service-record="${r.id}"><div><strong>${escapeHtml(r.title||capitalizedMonth(r.period))}</strong><small>${isPaid?`Pagado el ${fmtDate(r.comprobanteDate)} · ${escapeHtml(paidByText(r))}`:`${dueLabel(meta)} · vencimiento ${fmtDate(meta.date)}`}</small></div><div><strong>${fmtMoney(isPaid?paymentAmount(r):currentAmount(r))}</strong><small>${status}</small></div><div class="folder-docs"><span class="doc-chip ${r.facturaImg?'ok':''}">Factura ${r.facturaImg?'✓':'—'}</span><span class="doc-chip ${r.comprobanteImg?'ok':''}">Comprobante ${r.comprobanteImg?'✓':'—'}</span></div></div>`}).join('');
  openModal(`<h2>Carpeta · ${escapeHtml(service.name)}</h2><div class="modal-sub">${categoryOf(service).label} · ${service.recurring?'Pago mensual':'Pago eventual'}${service.dueDay?` · suele vencer el día ${service.dueDay}`:''}. Acá queda guardada toda la información para consultar o responder un reclamo.</div><div class="folder-total"><div><span>Historial abonado</span><strong>${fmtMoney(paidTotal)}</strong></div><div><span>Deuda pendiente</span><strong>${fmtMoney(debtTotal)}</strong></div><div><span>Comprobantes</span><strong>${paid.filter(r=>r.comprobanteImg).length} de ${paid.length}</strong></div></div><div class="folder-list">${rows||'<div class="empty">No hay facturas ni movimientos para este servicio.</div>'}</div><div class="modal-actions">${canEdit()?`<button class="btn danger" id="deleteService">Eliminar servicio</button><button class="btn outline" id="editService">Editar</button><button class="btn primary" id="newDueFromService">+ Cargar vencimiento</button>`:''}<button class="btn outline" data-close>Cerrar</button></div>`,'wide');
  document.querySelectorAll('[data-service-record]').forEach(row=>row.onclick=()=>{closeModal();openRecordDetail(row.dataset.serviceRecord)});
  if(canEdit()){

  }
}

function openModal(html,extraClass=''){document.getElementById('modalRoot').innerHTML=`<div class="overlay" id="overlay"><div class="modal ${extraClass}"><button class="close" data-close>×</button>${html}</div></div>`;document.querySelectorAll('[data-close]').forEach(x=>x.onclick=closeModal);overlay.onclick=e=>{if(e.target.id==='overlay')closeModal()}}
function closeModal(){document.getElementById('modalRoot').innerHTML=''}
function readImage(file,callback){if(!file)return;const reader=new FileReader();reader.onload=()=>{const img=new Image();img.onload=()=>{const scale=Math.min(1,1000/img.width),canvas=document.createElement('canvas');canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);callback(canvas.toDataURL('image/jpeg',.72))};img.src=reader.result};reader.readAsDataURL(file)}
