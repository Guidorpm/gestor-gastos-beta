<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gestor de Gastos Cloud</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f4f7f5;--card:#fff;--ink:#14211d;--muted:#708078;--line:#dfe8e3;
  --brand:#0d6b5a;--brand2:#e8f4f0;--green:#218a60;--yellow:#b48709;
  --orange:#d66a13;--red:#c63f45;--blue:#3469d4;--shadow:0 10px 35px rgba(20,33,29,.07)
}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}
button,input,select,textarea{font:inherit}.hidden{display:none!important}
.top{position:sticky;top:0;z-index:10;background:rgba(244,247,245,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topin{max-width:1180px;margin:auto;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.brand{display:flex;gap:11px;align-items:center}.mark{width:42px;height:42px;border-radius:14px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800}
.brand strong{display:block}.brand small{color:var(--muted)}.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
main{max-width:1180px;margin:auto;padding:26px 20px 70px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}
.btn{border:0;border-radius:12px;padding:10px 15px;font-weight:750;cursor:pointer}.btn.primary{background:var(--brand);color:white}.btn.soft{background:var(--brand2);color:var(--brand)}.btn.outline{background:white;border:1px solid var(--line);color:var(--ink)}.btn.danger{background:#fff0f0;color:var(--red)}.btn.small{padding:8px 11px;font-size:13px}.btn:disabled{opacity:.5;cursor:not-allowed}
.authwrap{min-height:100vh;display:grid;place-items:center;padding:24px}.auth{width:min(460px,100%);padding:30px}.auth h1{margin:18px 0 6px}.auth p{color:var(--muted);margin:0 0 20px}
.field{margin:13px 0}.field label{display:block;font-size:12px;font-weight:750;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:white;color:var(--ink)}.field textarea{min-height:80px}
.authswitch{margin-top:16px;text-align:center;color:var(--muted)}.linkbtn{border:0;background:none;color:var(--brand);font-weight:800;cursor:pointer}
.notice{padding:12px 14px;border-radius:12px;background:#fff8db;color:#725700;margin:14px 0;font-size:14px}
.workspace-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:16px}.workspace{padding:22px;cursor:pointer}.workspace:hover{border-color:var(--brand)}.workspace h3{margin:0 0 6px}.workspace p{color:var(--muted);margin:0}
.pagehead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:18px}.pagehead h1{margin:0 0 5px;font-size:28px}.pagehead p{margin:0;color:var(--muted)}
.tabs{display:flex;gap:6px;margin:18px 0}.tab{border:0;background:transparent;padding:10px 14px;border-radius:12px;font-weight:800;color:var(--muted);cursor:pointer}.tab.active{background:white;color:var(--brand);box-shadow:0 3px 15px rgba(20,33,29,.06)}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.stat{padding:18px}.stat span{display:block;color:var(--muted);font-size:13px}.stat strong{display:block;font-size:24px;margin-top:6px}
.matrix{overflow:auto}.matrix table{width:100%;border-collapse:separate;border-spacing:0;min-width:880px}.matrix th,.matrix td{padding:14px;border-bottom:1px solid var(--line);vertical-align:top}.matrix th{font-size:12px;text-transform:uppercase;color:var(--muted);text-align:left;background:#fbfcfb}.service-cell{min-width:220px}.service-name{font-weight:850}.service-meta{font-size:12px;color:var(--muted);margin-top:4px}
.monthbox{border:1px solid var(--line);border-radius:13px;padding:10px;min-height:82px;cursor:pointer;background:white}.monthbox:hover{border-color:var(--brand)}.monthbox .status{font-size:12px;font-weight:850}.monthbox .amount{font-weight:850;margin-top:7px}.monthbox .date{font-size:11px;color:var(--muted);margin-top:3px}
.missing{background:#fafcfa}.loaded{background:#edf8f3}.paid{background:#e7f5ff}.overdue{background:#fff0f0;border-color:#f1c7c9}.urgent{background:#fff2e5}.warning{background:#fff8db}
.list{padding:4px 20px}.row{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;padding:16px 0;border-bottom:1px solid var(--line)}.row:last-child{border-bottom:0}.row h3{margin:0 0 5px}.row p{margin:0;color:var(--muted);font-size:13px}.amountbig{font-weight:850;font-size:18px;text-align:right}
.balance{padding:20px;margin-bottom:18px}.balance h2{margin:0 0 5px}.balance p{margin:0;color:var(--muted)}.balancegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin-top:15px}.person{border:1px solid var(--line);border-radius:15px;padding:14px}.person strong{display:block}.person .money{font-size:22px;font-weight:850;margin:7px 0}.positive{color:var(--green)}.negative{color:var(--red)}.neutral{color:var(--muted)}
.modalbg{position:fixed;inset:0;background:rgba(15,25,21,.55);z-index:30;display:grid;place-items:center;padding:18px}.modal{width:min(620px,100%);max-height:90vh;overflow:auto;background:white;border-radius:22px;padding:24px;box-shadow:0 25px 80px rgba(0,0,0,.25)}.modal.wide{width:min(900px,100%)}.modal h2{margin:0 0 5px}.modal .sub{color:var(--muted);margin-bottom:18px}.modalactions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.memberline{display:grid;grid-template-columns:1fr 130px 110px;gap:8px;padding:10px 0;border-bottom:1px solid var(--line);align-items:center}
.folderitem{border:1px solid var(--line);border-radius:15px;padding:14px;margin:10px 0}.folderhead{display:flex;justify-content:space-between;gap:10px}.docs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#14211d;color:white;padding:11px 18px;border-radius:999px;opacity:0;pointer-events:none;transition:.2s;z-index:50}.toast.show{opacity:1}
.spinner{padding:60px;text-align:center;color:var(--muted)}
@media(max-width:760px){.summary{grid-template-columns:1fr 1fr}.pagehead{flex-direction:column}.grid2{grid-template-columns:1fr}.topin{align-items:flex-start}.actions{justify-content:flex-end}.memberline{grid-template-columns:1fr}.row{grid-template-columns:1fr}.amountbig{text-align:left}}
</style>
</head>
<body>
<div id="app"><div class="spinner">Conectando con la nube…</div></div>
<div id="modalRoot"></div><div class="toast" id="toast"></div>
<script>
const SUPABASE_URL='https://xjpuwokoefklxqezslwv.supabase.co';
const SUPABASE_KEY='sb_publishable_e8wc6ko1ZmlbkrPSR6PhrQ__wfoELkM';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
let session=null, groups=[], group=null, membership=null, members=[], services=[], obligations=[], payments=[], contributions=[], documents=[];
let tab='services', baseMonth=monthKey(new Date());

function monthKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function shiftMonth(key,n){const [y,m]=key.split('-').map(Number);return monthKey(new Date(y,m-1+n,1))}
function periodDate(key){return key+'-01'}
function monthLabel(key){const [y,m]=key.split('-');return `${MONTHS[Number(m)-1]} ${y}`}
function fmtMoney(v){return Number(v||0).toLocaleString('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0})}
function fmtDate(v){if(!v)return'—';return new Date(v+'T00:00:00').toLocaleDateString('es-AR')}
function esc(v){return String(v??'').replace(/[&<>'"]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[x]))}
function today(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate())}
function daysUntil(v){if(!v)return null;return Math.round((new Date(v+'T00:00:00')-today())/86400000)}
function canEdit(){return membership?.role==='admin'}
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove('show'),2200)}
function closeModal(){document.getElementById('modalRoot').innerHTML=''}
function modal(html,wide=false){document.getElementById('modalRoot').innerHTML=`<div class="modalbg" id="mbg"><div class="modal ${wide?'wide':''}">${html}</div></div>`;mbg.onclick=e=>{if(e.target===mbg)closeModal()};document.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeModal)}
function userName(){return session?.user?.user_metadata?.full_name||session?.user?.email?.split('@')[0]||'Usuario'}

async function init(){
  const {data}=await sb.auth.getSession();session=data.session;
  sb.auth.onAuthStateChange((_e,s)=>{session=s;if(!s){group=null;renderAuth()}});
  if(session)await loadGroups();else renderAuth();
}
function renderAuth(signup=false){
  app.innerHTML=`<div class="authwrap"><div class="auth card"><div class="brand"><div class="mark">G</div><div><strong>Gestor de Gastos</strong><small>Beta conectada a Supabase</small></div></div><h1>${signup?'Crear cuenta':'Ingresar'}</h1><p>${signup?'Usá un correo real. Puede ser necesario confirmarlo antes de ingresar.':'Accedé a tus grupos familiares o empresas.'}</p>
  ${signup?`<div class="field"><label>Nombre</label><input id="name" autocomplete="name"></div>`:''}
  <div class="field"><label>Email</label><input id="email" type="email" autocomplete="email"></div>
  <div class="field"><label>Contraseña</label><input id="password" type="password" autocomplete="${signup?'new-password':'current-password'}"></div>
  <button class="btn primary" style="width:100%" id="authBtn">${signup?'Crear cuenta':'Ingresar'}</button>
  <div class="authswitch">${signup?'¿Ya tenés cuenta?':'¿Primera vez?'} <button class="linkbtn" id="switch">${signup?'Ingresar':'Crear cuenta'}</button></div></div></div>`;
  switch.onclick=()=>renderAuth(!signup);
  authBtn.onclick=async()=>{
    authBtn.disabled=true;
    let res;
    if(signup)res=await sb.auth.signUp({email:email.value.trim(),password:password.value,options:{data:{full_name:name.value.trim()}}});
    else res=await sb.auth.signInWithPassword({email:email.value.trim(),password:password.value});
    authBtn.disabled=false;
    if(res.error){toast(res.error.message);return}
    if(signup&&!res.data.session){toast('Cuenta creada. Revisá tu email para confirmarla.');renderAuth(false);return}
    session=res.data.session;await loadGroups();
  };
}
async function loadGroups(){
  app.innerHTML='<div class="spinner">Cargando tus espacios…</div>';
  const {data,error}=await sb.from('memberships').select('id,role,participation_percent,display_name,group_id,groups(id,name,type,join_code)').eq('user_id',session.user.id).eq('active',true);
  if(error){toast(error.message);return}
  groups=(data||[]).map(x=>({...x.groups,membership:x}));
  renderGroups();
}
function renderGroups(){
  app.innerHTML=`<main><div class="pagehead"><div><h1>Tus espacios</h1><p>Elegí un grupo o creá uno nuevo.</p></div><div class="actions"><button class="btn outline" id="joinBtn">Unirme con código</button><button class="btn primary" id="newGroup">+ Crear espacio</button><button class="btn soft" id="logout">Salir</button></div></div>
  <div class="workspace-grid">${groups.map(g=>`<div class="workspace card" data-group="${g.id}"><h3>${esc(g.name)}</h3><p>${g.type==='company'?'Empresa':'Grupo familiar'} · ${g.membership.role==='admin'?'Administrador':'Solo consulta'}</p></div>`).join('')||'<div class="card workspace"><h3>No tenés espacios todavía</h3><p>Creá una familia o empresa, o ingresá un código de invitación.</p></div>'}</div></main>`;
  document.querySelectorAll('[data-group]').forEach(e=>e.onclick=()=>openGroup(e.dataset.group));
  logout.onclick=()=>sb.auth.signOut();
  newGroup.onclick=openCreateGroup;joinBtn.onclick=openJoinGroup;
}
function openCreateGroup(){
  modal(`<h2>Crear espacio</h2><div class="sub">Después podrás compartir el código para sumar integrantes.</div>
  <div class="field"><label>Nombre</label><input id="gname" placeholder="Ej: Familia Rizzo"></div>
  <div class="field"><label>Tipo</label><select id="gtype"><option value="family">Grupo familiar</option><option value="company">Empresa</option></select></div>
  <div class="modalactions"><button class="btn outline" data-close>Cancelar</button><button class="btn primary" id="saveGroup">Crear</button></div>`);
  saveGroup.onclick=async()=>{if(!gname.value.trim())return toast('Ingresá un nombre');const {data,error}=await sb.rpc('create_group',{p_name:gname.value.trim(),p_type:gtype.value,p_owner_name:userName()});if(error)return toast(error.message);closeModal();await loadGroups();await openGroup(data)};
}
function openJoinGroup(){
  modal(`<h2>Unirme a un espacio</h2><div class="sub">Ingresá el código que te compartió un administrador.</div>
  <div class="field"><label>Código</label><input id="joinCode" maxlength="8" style="text-transform:uppercase"></div>
  <div class="field"><label>Nombre visible</label><input id="joinName" value="${esc(userName())}"></div>
  <div class="modalactions"><button class="btn outline" data-close>Cancelar</button><button class="btn primary" id="doJoin">Unirme</button></div>`);
  doJoin.onclick=async()=>{const {data,error}=await sb.rpc('join_group',{p_join_code:joinCode.value,p_display_name:joinName.value});if(error)return toast(error.message);closeModal();await loadGroups();await openGroup(data)};
}
async function openGroup(id){
  group=groups.find(g=>g.id===id)||{id};
  membership=group.membership||null;
  app.innerHTML='<div class="spinner">Sincronizando información…</div>';
  await reloadGroup();
  renderApp();
}
async function reloadGroup(){
  const [m,s,o,p,c,d,g]=await Promise.all([
    sb.from('memberships').select('*').eq('group_id',group.id).eq('active',true).order('created_at'),
    sb.from('services').select('*').eq('group_id',group.id).eq('active',true).order('name'),
    sb.from('obligations').select('*,services!inner(group_id)').eq('services.group_id',group.id),
    sb.from('payments').select('*,obligations!inner(service_id,services!inner(group_id))').eq('obligations.services.group_id',group.id),
    sb.from('payment_contributions').select('*,payments!inner(obligation_id,obligations!inner(service_id,services!inner(group_id)))').eq('payments.obligations.services.group_id',group.id),
    sb.from('documents').select('*').eq('group_id',group.id),
    sb.from('groups').select('*').eq('id',group.id).single()
  ]);
  const err=[m,s,o,p,c,d,g].find(x=>x.error)?.error;if(err)toast(err.message);
  members=m.data||[];services=s.data||[];obligations=(o.data||[]).map(({services,...x})=>x);payments=(p.data||[]).map(({obligations,...x})=>x);contributions=(c.data||[]).map(({payments,...x})=>x);documents=d.data||[];
  group={...(g.data||group),membership:groups.find(x=>x.id===group.id)?.membership};
  membership=members.find(x=>x.user_id===session.user.id)||membership;
}
function renderApp(){
  const ms=[baseMonth,shiftMonth(baseMonth,1),shiftMonth(baseMonth,2)];
  app.innerHTML=`<div class="top"><div class="topin"><div class="brand"><div class="mark">${group.type==='company'?'E':'F'}</div><div><strong>${esc(group.name)}</strong><small>${group.type==='company'?'Empresa':'Grupo familiar'} · ${canEdit()?'Administrador':'Solo consulta'}</small></div></div><div class="actions">${canEdit()?'<button class="btn soft small" id="membersBtn">Integrantes</button>':''}<button class="btn outline small" id="backBtn">Cambiar espacio</button><button class="btn outline small" id="signOut">Salir</button></div></div></div>
  <main><div class="tabs"><button class="tab ${tab==='services'?'active':''}" data-tab="services">Servicios e impuestos</button><button class="tab ${tab==='paid'?'active':''}" data-tab="paid">Abonados</button></div><div id="content"></div></main>`;
  backBtn.onclick=()=>{group=null;loadGroups()};signOut.onclick=()=>sb.auth.signOut();
  if(canEdit())membersBtn.onclick=openMembers;
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;renderApp()});
  content.innerHTML=tab==='services'?renderServices(ms):renderPaid();
  bindDashboard(ms);
}
function obligationFor(serviceId,key){return obligations.find(o=>o.service_id===serviceId&&o.period===periodDate(key))}
function paymentFor(obligationId){return payments.find(p=>p.obligation_id===obligationId)}
function boxClass(o){if(!o)return'missing';if(o.status==='paid'||paymentFor(o.id))return'paid';const d=daysUntil(o.due_date);if(d!==null&&d<0)return'overdue';if(d!==null&&d<=2)return'urgent';if(d!==null&&d<=5)return'warning';return'loaded'}
function boxText(o){if(!o)return['Sin datos','Cargar importe y vencimiento'];if(o.status==='paid'||paymentFor(o.id))return['Abonado',fmtMoney(paymentFor(o.id)?.total_amount||o.amount)];const d=daysUntil(o.due_date);if(d!==null&&d<0)return['Vencido',fmtMoney(o.amount)];return['Cargado · falta pagar',fmtMoney(o.amount)]}
function pendingObligations(){return obligations.filter(o=>!paymentFor(o.id)&&o.status!=='cancelled').sort((a,b)=>(a.due_date||'9999').localeCompare(b.due_date||'9999'))}
function renderServices(ms){
  const pending=pendingObligations(),over=pending.filter(o=>daysUntil(o.due_date)<0),missing=services.filter(s=>s.frequency==='monthly'&&!obligationFor(s.id,baseMonth)).length;
  return `<div class="pagehead"><div><h1>Servicios e impuestos</h1><p>Cuadro mensual, deudas e historial documental.</p></div>${canEdit()?'<div class="actions"><button class="btn outline" id="prevMonth">‹ Mes</button><button class="btn outline" id="nextMonth">Mes ›</button><button class="btn primary" id="addService">+ Agregar</button></div>':''}</div>
  ${renderBalance()}
  <div class="summary"><div class="stat card"><span>Falta cargar en ${monthLabel(baseMonth)}</span><strong>${missing}</strong></div><div class="stat card"><span>Pendiente total</span><strong>${fmtMoney(pending.reduce((a,o)=>a+Number(o.amount||0),0))}</strong></div><div class="stat card"><span>Deuda vencida</span><strong>${fmtMoney(over.reduce((a,o)=>a+Number(o.amount||0),0))}</strong></div><div class="stat card"><span>Servicios activos</span><strong>${services.length}</strong></div></div>
  <div class="matrix card"><table><thead><tr><th>Servicio</th>${ms.map(m=>`<th>${monthLabel(m)}</th>`).join('')}<th>Carpeta</th></tr></thead><tbody>${services.map(s=>`<tr><td class="service-cell"><div class="service-name">${esc(s.name)}</div><div class="service-meta">${esc(s.category)} · ${s.frequency==='monthly'?'Mensual':'Puntual'}</div></td>${ms.map(m=>{const o=obligationFor(s.id,m),t=boxText(o);return`<td><div class="monthbox ${boxClass(o)}" data-cell="${s.id}|${m}"><div class="status">${t[0]}</div><div class="amount">${t[1]}</div>${o?.due_date?`<div class="date">Vence ${fmtDate(o.due_date)}</div>`:''}</div></td>`}).join('')}<td><button class="btn soft small" data-folder="${s.id}">Abrir</button></td></tr>`).join('')||'<tr><td colspan="5">Todavía no hay servicios.</td></tr>'}</tbody></table></div>`;
}
function balanceData(){
  const rows=members.filter(m=>Number(m.participation_percent)>0).map(m=>({m,owed:0,paid:0,balance:0}));
  payments.forEach(p=>{const o=obligations.find(x=>x.id===p.obligation_id);if(!o)return;const amount=Number(p.total_amount||0),sumShares=rows.reduce((a,r)=>a+Number(r.m.participation_percent||0),0)||100;rows.forEach(r=>r.owed+=amount*Number(r.m.participation_percent||0)/sumShares);contributions.filter(c=>c.payment_id===p.id).forEach(c=>{const r=rows.find(x=>x.m.id===c.membership_id);if(r)r.paid+=Number(c.amount||0)})});
  rows.forEach(r=>r.balance=r.paid-r.owed);return rows;
}
function renderBalance(){const rows=balanceData();return `<div class="balance card"><h2>Equilibrio acumulado</h2><p>Compara lo que correspondía pagar con lo efectivamente aportado.</p><div class="balancegrid">${rows.map(r=>`<div class="person"><strong>${esc(r.m.display_name)}</strong><div class="money ${r.balance>1?'positive':r.balance<-1?'negative':'neutral'}">${r.balance>=0?'+':''}${fmtMoney(r.balance)}</div><small>Correspondía ${fmtMoney(r.owed)} · Pagó ${fmtMoney(r.paid)}</small></div>`).join('')||'<div class="person">Definí porcentajes de participación.</div>'}</div></div>`}
function renderPaid(){
  const list=payments.slice().sort((a,b)=>b.paid_at.localeCompare(a.paid_at));
  return `<div class="pagehead"><div><h1>Abonados</h1><p>Historial completo de pagos y comprobantes.</p></div></div><div class="list card">${list.map(p=>{const o=obligations.find(x=>x.id===p.obligation_id),s=services.find(x=>x.id===o?.service_id);return`<div class="row"><div><h3>${esc(s?.name||'Servicio')}</h3><p>${o?monthLabel(o.period.slice(0,7)):'Pago'} · abonado ${fmtDate(p.paid_at)}</p></div><div><div class="amountbig">${fmtMoney(p.total_amount)}</div><button class="btn soft small" data-payment="${p.id}">Abrir</button></div></div>`}).join('')||'<div class="row"><p>Todavía no hay pagos registrados.</p></div>'}</div>`;
}
function bindDashboard(ms){
  if(document.getElementById('prevMonth'))prevMonth.onclick=()=>{baseMonth=shiftMonth(baseMonth,-1);renderApp()};
  if(document.getElementById('nextMonth'))nextMonth.onclick=()=>{baseMonth=shiftMonth(baseMonth,1);renderApp()};
  if(document.getElementById('addService'))addService.onclick=openServiceModal;
  document.querySelectorAll('[data-cell]').forEach(e=>e.onclick=()=>{const [s,m]=e.dataset.cell.split('|');openObligation(s,m)});
  document.querySelectorAll('[data-folder]').forEach(e=>e.onclick=()=>openFolder(e.dataset.folder));
  document.querySelectorAll('[data-payment]').forEach(e=>e.onclick=()=>openPaymentDetail(e.dataset.payment));
}
function openServiceModal(){
  modal(`<h2>Agregar servicio o impuesto</h2><div class="field"><label>Nombre</label><input id="sname"></div><div class="grid2"><div class="field"><label>Categoría</label><select id="scat"><option>Luz</option><option>Gas</option><option>Agua</option><option>Internet</option><option>Alquiler</option><option>Impuesto</option><option>Moratoria</option><option>Otro</option></select></div><div class="field"><label>Frecuencia</label><select id="sfreq"><option value="monthly">Mensual</option><option value="one_time">Puntual</option></select></div></div><div class="modalactions"><button class="btn outline" data-close>Cancelar</button><button class="btn primary" id="saveService">Guardar</button></div>`);
  saveService.onclick=async()=>{if(!sname.value.trim())return toast('Ingresá un nombre');const {error}=await sb.from('services').insert({group_id:group.id,name:sname.value.trim(),category:scat.value,frequency:sfreq.value,created_by:session.user.id});if(error)return toast(error.message);closeModal();await reloadGroup();renderApp()};
}
function openObligation(serviceId,key){
  const s=services.find(x=>x.id===serviceId),o=obligationFor(serviceId,key),p=o&&paymentFor(o.id);
  modal(`<h2>${esc(s.name)} · ${monthLabel(key)}</h2><div class="sub">${o?'Editar la factura y consultar su estado.':'Falta cargar importe y vencimiento.'}</div>
  <div class="grid2"><div class="field"><label>Importe</label><input id="oamount" type="number" value="${o?.amount||''}" ${!canEdit()?'disabled':''}></div><div class="field"><label>Vencimiento</label><input id="odue" type="date" value="${o?.due_date||''}" ${!canEdit()?'disabled':''}></div></div>
  <div class="field"><label>Notas</label><textarea id="onotes" ${!canEdit()?'disabled':''}>${esc(o?.notes||'')}</textarea></div>
  ${o?`<div class="field"><label>Factura</label><input id="invoiceFile" type="file" accept="image/*,application/pdf" ${!canEdit()?'disabled':''}></div>`:''}
  ${p?`<div class="notice">Abonado el ${fmtDate(p.paid_at)} por ${fmtMoney(p.total_amount)}</div>`:''}
  <div class="modalactions"><button class="btn outline" data-close>Cerrar</button>${canEdit()?`<button class="btn soft" id="saveObligation">${o?'Guardar cambios':'Cargar datos'}</button>${o&&!p?'<button class="btn primary" id="markPaid">Marcar abonado</button>':''}`:''}</div>`);
  if(!canEdit())return;
  saveObligation.onclick=async()=>{if(!oamount.value||!odue.value)return toast('Completá importe y vencimiento');let id=o?.id;const payload={service_id:serviceId,period:periodDate(key),amount:Number(oamount.value),due_date:odue.value,status:'pending',notes:onotes.value,created_by:session.user.id};let res=o?await sb.from('obligations').update(payload).eq('id',o.id).select().single():await sb.from('obligations').insert(payload).select().single();if(res.error)return toast(res.error.message);id=res.data.id;if(invoiceFile?.files?.[0])await uploadDoc(invoiceFile.files[0],serviceId,id,null,'invoice');closeModal();await reloadGroup();renderApp();toast('Datos guardados')};
  if(o&&!p)markPaid.onclick=()=>openPayModal(o);
}
async function uploadDoc(file,serviceId,obligationId,paymentId,kind){
  const safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_'),path=`${group.id}/${serviceId}/${Date.now()}_${safe}`;
  const up=await sb.storage.from('documents').upload(path,file,{contentType:file.type,upsert:false});if(up.error){toast(up.error.message);return}
  const {error}=await sb.from('documents').insert({group_id:group.id,obligation_id:obligationId,payment_id:paymentId,kind,file_path:path,original_name:file.name,mime_type:file.type,size_bytes:file.size,uploaded_by:session.user.id});if(error)toast(error.message);
}
function openPayModal(o){
  const active=members.filter(m=>Number(m.participation_percent)>0);
  const defaults={};let left=Number(o.amount||0);active.forEach((m,i)=>{const v=i===active.length-1?left:Math.round(Number(o.amount||0)*Number(m.participation_percent||0)/100);defaults[m.id]=v;left-=v});
  modal(`<h2>Registrar pago</h2><div class="sub">Indicá cuánto aportó realmente cada integrante.</div><div class="grid2"><div class="field"><label>Fecha</label><input id="paidDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div class="field"><label>Total pagado</label><input id="paidTotal" type="number" value="${o.amount||0}"></div></div>
  ${active.map(m=>`<div class="field"><label>${esc(m.display_name)} aportó</label><input type="number" data-contrib="${m.id}" value="${defaults[m.id]||0}"></div>`).join('')}
  <div class="field"><label>Comprobante</label><input id="receiptFile" type="file" accept="image/*,application/pdf"></div>
  <div class="modalactions"><button class="btn outline" data-close>Cancelar</button><button class="btn primary" id="savePay">Registrar pago</button></div>`);
  savePay.onclick=async()=>{const vals=[...document.querySelectorAll('[data-contrib]')].map(x=>({membership_id:x.dataset.contrib,amount:Number(x.value||0)})),sum=vals.reduce((a,x)=>a+x.amount,0),total=Number(paidTotal.value||0);if(Math.abs(sum-total)>.01)return toast('Los aportes deben sumar el total pagado');const {data:p,error}=await sb.from('payments').insert({obligation_id:o.id,paid_at:paidDate.value,total_amount:total,created_by:session.user.id}).select().single();if(error)return toast(error.message);const c=await sb.from('payment_contributions').insert(vals.map(x=>({...x,payment_id:p.id})));if(c.error)return toast(c.error.message);await sb.from('obligations').update({status:'paid'}).eq('id',o.id);if(receiptFile.files[0])await uploadDoc(receiptFile.files[0],o.service_id,o.id,p.id,'receipt');closeModal();await reloadGroup();renderApp();toast('Pago registrado')};
}
function openFolder(serviceId){
  const s=services.find(x=>x.id===serviceId),os=obligations.filter(x=>x.service_id===serviceId).sort((a,b)=>b.period.localeCompare(a.period));
  modal(`<h2>Carpeta · ${esc(s.name)}</h2><div class="sub">Facturas, deudas, pagos y comprobantes.</div>${os.map(o=>{const p=paymentFor(o.id),docs=documents.filter(d=>d.obligation_id===o.id||d.payment_id===p?.id);return`<div class="folderitem"><div class="folderhead"><div><strong>${monthLabel(o.period.slice(0,7))}</strong><div>${fmtMoney(o.amount)} · vence ${fmtDate(o.due_date)}</div></div><span>${p?'Abonado':'Pendiente'}</span></div>${p?`<p>Pagado ${fmtDate(p.paid_at)} · ${fmtMoney(p.total_amount)}</p>`:''}<div class="docs">${docs.map(d=>`<button class="btn soft small" data-doc="${d.file_path}">${d.kind==='invoice'?'Factura':'Comprobante'}</button>`).join('')||'<small>Sin documentos adjuntos</small>'}</div></div>`}).join('')||'<div class="notice">Todavía no hay movimientos.</div>'}<div class="modalactions"><button class="btn outline" data-close>Cerrar</button></div>`,true);
  document.querySelectorAll('[data-doc]').forEach(b=>b.onclick=async()=>{const {data,error}=await sb.storage.from('documents').createSignedUrl(b.dataset.doc,120);if(error)return toast(error.message);window.open(data.signedUrl,'_blank')});
}
function openPaymentDetail(id){const p=payments.find(x=>x.id===id),o=obligations.find(x=>x.id===p.obligation_id),s=services.find(x=>x.id===o.service_id),cs=contributions.filter(x=>x.payment_id===id);modal(`<h2>${esc(s.name)}</h2><div class="sub">${monthLabel(o.period.slice(0,7))}</div><div class="notice">Pagado ${fmtDate(p.paid_at)} · ${fmtMoney(p.total_amount)}</div>${cs.map(c=>`<div class="row"><span>${esc(members.find(m=>m.id===c.membership_id)?.display_name||'Integrante')}</span><strong>${fmtMoney(c.amount)}</strong></div>`).join('')}<div class="modalactions"><button class="btn outline" data-close>Cerrar</button><button class="btn soft" id="openFolderBtn">Abrir carpeta</button></div>`);openFolderBtn.onclick=()=>openFolder(s.id)}
function openMembers(){
  modal(`<h2>Integrantes y acceso</h2><div class="sub">Código para unirse: <strong>${esc(group.join_code)}</strong></div>${members.map(m=>`<div class="memberline"><div><strong>${esc(m.display_name)}</strong><small style="display:block;color:var(--muted)">${m.user_id===session.user.id?'Tu usuario':''}</small></div><select data-role="${m.id}"><option value="admin" ${m.role==='admin'?'selected':''}>Administrador</option><option value="viewer" ${m.role==='viewer'?'selected':''}>Solo consulta</option></select><input data-share="${m.id}" type="number" min="0" max="100" value="${m.participation_percent}"></div>`).join('')}<div class="notice">Los porcentajes de quienes aportan deberían sumar 100%.</div><div class="modalactions"><button class="btn outline" data-close>Cerrar</button><button class="btn primary" id="saveMembers">Guardar</button></div>`,true);
  saveMembers.onclick=async()=>{const updates=members.map(m=>({id:m.id,role:document.querySelector(`[data-role="${m.id}"]`).value,participation_percent:Number(document.querySelector(`[data-share="${m.id}"]`).value||0)}));if(Math.abs(updates.reduce((a,x)=>a+x.participation_percent,0)-100)>.01)return toast('Los porcentajes deben sumar 100%');for(const u of updates){const {error}=await sb.from('memberships').update({role:u.role,participation_percent:u.participation_percent}).eq('id',u.id);if(error)return toast(error.message)}closeModal();await reloadGroup();renderApp();toast('Integrantes actualizados')};
}
init();
</script>
</body>
</html>
