<style>
:root{
  --bg:#f4f7f5;--card:#fff;--ink:#14211d;--muted:#708078;--line:#dfe8e3;
  --brand:#0d6b5a;--brand2:#e8f4f0;--green:#218a60;--yellow:#b48709;
  --orange:#d66a13;--red:#c63f45;--blue:#3469d4;--shadow:0 10px 35px rgba(20,33,29,.07)
}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}
button,input,select,textarea{font:inherit}.hidden{display:none!important}
.top{position:sticky;top:0;z-index:10;background:rgba(244,247,245,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topin{max-width:1180px;margin:auto;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.brand{display:flex;gap:11px;align-items:center}.mark{width:42px;height:42px;border-radius:14px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800}
.brand strong{display:block}.brand small{color:var(--muted)}.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
main{max-width:1180px;margin:auto;padding:26px 20px 70px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}
.btn{border:0;border-radius:12px;padding:10px 15px;font-weight:750;cursor:pointer}.btn.primary{background:var(--brand);color:white}.btn.soft{background:var(--brand2);color:var(--brand)}.btn.outline{background:white;border:1px solid var(--line);color:var(--ink)}.btn.danger{background:#fff0f0;color:var(--red)}.btn.small{padding:8px 11px;font-size:13px}.btn:disabled{opacity:.5;cursor:not-allowed}
.authwrap{min-height:100vh;display:grid;place-items:center;padding:24px}.auth{width:min(460px,100%);padding:30px}.auth h1{margin:18px 0 6px}.auth p{color:var(--muted);margin:0 0 20px}
.field{margin:13px 0}.field label{display:block;font-size:12px;font-weight:750;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:white;color:var(--ink)}.field textarea{min-height:80px}
.authswitch{margin-top:16px;text-align:center;color:var(--muted)}.linkbtn{border:0;background:none;color:var(--brand);font-weight:800;cursor:pointer}
.notice{padding:12px 14px;border-radius:12px;background:#fff8db;color:#725700;margin:14px 0;font-size:14px}
.workspace-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:16px}.workspace{padding:22px;cursor:pointer}.workspace:hover{border-color:var(--brand)}.workspace h3{margin:0 0 6px}.workspace p{color:var(--muted);margin:0}
.pagehead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:18px}.pagehead h1{margin:0 0 5px;font-size:28px}.pagehead p{margin:0;color:var(--muted)}
.tabs{display:flex;gap:6px;margin:18px 0}.tab{border:0;background:transparent;padding:10px 14px;border-radius:12px;font-weight:800;color:var(--muted);cursor:pointer}.tab.active{background:white;color:var(--brand);box-shadow:0 3px 15px rgba(20,33,29,.06)}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.stat{padding:18px}.stat span{display:block;color:var(--muted);font-size:13px}.stat strong{display:block;font-size:24px;margin-top:6px}
.matrix{overflow:auto}.matrix table{width:100%;border-collapse:separate;border-spacing:0;min-width:880px}.matrix th,.matrix td{padding:14px;border-bottom:1px solid var(--line);vertical-align:top}.matrix th{font-size:12px;text-transform:uppercase;color:var(--muted);text-align:left;background:#fbfcfb}.service-cell{min-width:220px}.service-name{font-weight:850}.service-meta{font-size:12px;color:var(--muted);margin-top:4px}
.monthbox{border:1px solid var(--line);border-radius:13px;padding:10px;min-height:82px;cursor:pointer;background:white}.monthbox:hover{border-color:var(--brand)}.monthbox .status{font-size:12px;font-weight:850}.monthbox .amount{font-weight:850;margin-top:7px}.monthbox .date{font-size:11px;color:var(--muted);margin-top:3px}
.missing{background:#fafcfa}.paid{background:#e7f5ff;border-color:#a8d4f5}
.due-green{background:#e7f7ee;border-color:#84c9a6}.due-green-soft{background:#f0f8e8;border-color:#b8d99a}
.warning{background:#fff8db;border-color:#ead273}.urgent{background:#fff0df;border-color:#efaf6e}.overdue{background:#ffe9ea;border-color:#e58f94}
.due-green .status,.due-green-soft .status{color:#19734f}.warning .status{color:#8a6700}.urgent .status{color:#b4560b}.overdue .status{color:#b72e35}.paid .status{color:#245fa8}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 16px}.legend span{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 10px;font-size:11px;color:var(--muted)}.legend i{width:10px;height:10px;border-radius:50%;display:inline-block}
.forecast{padding:20px;margin:0 0 18px}.forecast h2{margin:0 0 5px}.forecast>p{margin:0;color:var(--muted)}.forecast-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:15px}.forecast-month{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff}.forecast-month h3{margin:0 0 8px;font-size:15px}.forecast-total{font-size:23px;font-weight:850}.forecast-detail{font-size:12px;color:var(--muted);margin-top:4px}.forecast-shares{border-top:1px solid var(--line);margin-top:10px;padding-top:8px}.forecast-share{display:flex;justify-content:space-between;gap:8px;font-size:12px;padding:3px 0}.estimate{color:#8a6700}.confirmed{color:var(--green)}
.invite-box{border:1px solid var(--line);border-radius:16px;padding:15px;background:#fafcfa}.invite-code{font-size:25px;font-weight:900;letter-spacing:.12em;color:var(--brand);word-break:break-all}.invite-url{font-size:12px;color:var(--muted);word-break:break-all;margin:8px 0}.qr-wrap{display:flex;justify-content:center;background:white;border:1px solid var(--line);border-radius:15px;padding:14px;margin:14px auto;width:fit-content}.access-note{font-size:12px;color:var(--muted);margin-top:6px}.alias-chip{display:inline-flex;align-items:center;border-radius:999px;background:var(--brand2);color:var(--brand);padding:4px 8px;font-size:11px;font-weight:800;margin-left:6px}
.owner-chip{display:inline-flex;align-items:center;border-radius:999px;background:#14211d;color:#fff;padding:4px 8px;font-size:10px;font-weight:850;margin-left:6px;text-transform:uppercase;letter-spacing:.04em}
.access-grid{display:grid;grid-template-columns:minmax(180px,1fr) 145px 105px 120px 80px;gap:8px;padding:11px 0;border-bottom:1px solid var(--line);align-items:center}
.access-check{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--muted)}.access-check input{width:auto}
.report-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.report-card{padding:18px}.report-card span{display:block;color:var(--muted);font-size:12px}.report-card strong{display:block;font-size:24px;margin-top:6px}
.report-columns{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}.report-panel{padding:20px}.report-panel h2{margin:0 0 5px}.report-panel>p{margin:0 0 16px;color:var(--muted);font-size:13px}
.report-row{display:grid;grid-template-columns:minmax(100px,1fr) 2fr auto;gap:10px;align-items:center;padding:8px 0}.report-row+.report-row{border-top:1px solid var(--line)}.report-label{font-size:13px;font-weight:700}.report-track{height:9px;border-radius:999px;background:#edf1ef;overflow:hidden}.report-fill{height:100%;border-radius:999px;background:var(--brand)}.report-value{font-size:12px;font-weight:800;white-space:nowrap}
.report-table{width:100%;border-collapse:collapse}.report-table th,.report-table td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line);font-size:13px}.report-table th{color:var(--muted);font-size:11px;text-transform:uppercase}.permission-badge{display:inline-flex;border-radius:999px;padding:4px 8px;background:#eef2ff;color:#4356a8;font-size:10px;font-weight:850}
@media(max-width:900px){.report-grid{grid-template-columns:1fr 1fr}.report-columns{grid-template-columns:1fr}.access-grid{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.report-grid{grid-template-columns:1fr}.access-grid{grid-template-columns:1fr}.access-check{justify-content:flex-start}}

@media(max-width:900px){.forecast-grid{grid-template-columns:1fr 1fr}}@media(max-width:560px){.forecast-grid{grid-template-columns:1fr}}
.not-applicable{background:#f1f3f2;color:#8a958f;cursor:default;border-style:dashed}.not-applicable:hover{border-color:var(--line)}
.month-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
.month-check{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:11px;padding:9px;background:#fff;font-size:13px;cursor:pointer}
.month-check input{width:auto;margin:0}
.plan-fields{border:1px solid var(--line);border-radius:15px;padding:14px;margin-top:12px;background:#fafcfa}
@media(max-width:560px){.month-picker{grid-template-columns:repeat(3,1fr)}}
.list{padding:4px 20px}.row{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;padding:16px 0;border-bottom:1px solid var(--line)}.row:last-child{border-bottom:0}.row h3{margin:0 0 5px}.row p{margin:0;color:var(--muted);font-size:13px}.amountbig{font-weight:850;font-size:18px;text-align:right}
.balance{padding:20px;margin-bottom:18px}.balance h2{margin:0 0 5px}.balance p{margin:0;color:var(--muted)}.balancegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin-top:15px}.person{border:1px solid var(--line);border-radius:15px;padding:14px}.person strong{display:block}.person .money{font-size:22px;font-weight:850;margin:7px 0}.positive{color:var(--green)}.negative{color:var(--red)}.neutral{color:var(--muted)}
.modalbg{position:fixed;inset:0;background:rgba(15,25,21,.55);z-index:30;display:grid;place-items:center;padding:18px}.modal{width:min(620px,100%);max-height:90vh;overflow:auto;background:white;border-radius:22px;padding:24px;box-shadow:0 25px 80px rgba(0,0,0,.25)}.modal.wide{width:min(900px,100%)}.modal h2{margin:0 0 5px}.modal .sub{color:var(--muted);margin-bottom:18px}.modalactions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.memberline{display:grid;grid-template-columns:1fr 130px 110px;gap:8px;padding:10px 0;border-bottom:1px solid var(--line);align-items:center}
.folderitem{border:1px solid var(--line);border-radius:15px;padding:14px;margin:10px 0}.folderhead{display:flex;justify-content:space-between;gap:10px}.docs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#14211d;color:white;padding:11px 18px;border-radius:999px;opacity:0;pointer-events:none;transition:.2s;z-index:50}.toast.show{opacity:1}
.spinner{padding:60px;text-align:center;color:var(--muted)}
@media(max-width:760px){.summary{grid-template-columns:1fr 1fr}.pagehead{flex-direction:column}.grid2{grid-template-columns:1fr}.topin{align-items:flex-start}.actions{justify-content:flex-end}.memberline{grid-template-columns:1fr}.row{grid-template-columns:1fr}.amountbig{text-align:left}}
</style>
</head>
<body>
<div id="app"><div class="spinner">Conectando con la nube…</div></div>
<div id="modalRoot"></div><div class="toast" id="toast"></div>
<script>
const SUPABASE_URL='https://xjpuwokoefklxqezslwv.supabase.co';
const SUPABASE_KEY='sb_publishable_e8wc6ko1ZmlbkrPSR6PhrQ__wfoELkM';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
let session=null, groups=[], group=null, membership=null, members=[], services=[], obligations=[], payments=[], contributions=[], documents=[];
let tab='services', baseMonth=monthKey(new Date());
let pendingInviteToken=new URLSearchParams(location.search).get('invite')||localStorage.getItem('pendingInviteToken')||'';

function monthKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function shiftMonth(key,n){const [y,m]=key.split('-').map(Number);return monthKey(new Date(y,m-1+n,1))}
function periodDate(key){return key+'-01'}
function monthLabel(key){const [y,m]=key.split('-');return `${MONTHS[Number(m)-1]} ${y}`}
function fmtMoney(v){return Number(v||0).toLocaleString('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0})}
function fmtDate(v){if(!v)return'—';return new Date(v+'T00:00:00').toLocaleDateString('es-AR')}
function esc(v){return String(v??'').replace(/[&<>'"]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[x]))}
function today(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate())}
function daysUntil(v){if(!v)return null;return Math.round((new Date(v+'T00:00:00')-today())/86400000)}
function canEdit(){return membership?.role==='admin'}
function isOwner(){return !!group&&!!session&&group.created_by===session.user.id}
function canManageAccess(){return isOwner()}
function canViewReports(){return isOwner()||membership?.can_view_reports===true}
function currentRoleLabel(){if(isOwner())return 'Administrador principal';return canEdit()?'Administrador':'Solo consulta'}
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove('show'),2200)}
function closeModal(){document.getElementById('modalRoot').innerHTML=''}
function modal(html,wide=false){document.getElementById('modalRoot').innerHTML=`<div class="modalbg" id="mbg"><div class="modal ${wide?'wide':''}">${html}</div></div>`;mbg.onclick=e=>{if(e.target===mbg)closeModal()};document.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeModal)}
function userName(){return session?.user?.user_metadata?.full_name||session?.user?.email?.split('@')[0]||'Usuario'}

async function init(){
  try{
    if(pendingInviteToken)localStorage.setItem('pendingInviteToken',pendingInviteToken);
    const {data,error}=await sb.auth.getSession();
    if(error)throw error;
    session=data.session;
    sb.auth.onAuthStateChange((_event,newSession)=>{
      session=newSession;
      if(!newSession){group=null;renderAuth(false)}
    });
    if(session){
      if(pendingInviteToken)await redeemPendingInvite();
      else await loadGroups();
    }else{
      renderAuth(false);
    }
  }catch(err){
    console.error(err);
    app.innerHTML=`<div class="authwrap"><div class="auth card"><h1>No se pudo iniciar</h1><p>${esc(err?.message||'Error de conexión')}</p><button class="btn primary" onclick="location.reload()">Reintentar</button></div></div>`;
  }
}
function renderAuth(signup=false){
  const inviteNotice=pendingInviteToken?`<div class="notice">Tenés una invitación pendiente. Después de ingresar o crear tu cuenta, accederás solamente al espacio autorizado.</div>`:'';
  app.innerHTML=`<div class="authwrap"><div class="auth card"><div class="brand"><div class="mark">G</div><div><strong>Gestor de Gastos</strong><small>Acceso privado · permisos por espacio</small></div></div><h1>${signup?'Crear cuenta':'Ingresar'}</h1><p>${signup?'Creá tu usuario para aceptar la invitación.':'Ingresá con tu correo y contraseña.'}</p>${inviteNotice}
  ${signup?`<div class="field"><label>Nombre o alias</label><input id="name" autocomplete="name"></div>`:''}
  <div class="field"><label>Correo electrónico</label><input id="email" type="email" autocomplete="email"></div>
  <div class="field"><label>Contraseña</label><input id="password" type="password" autocomplete="${signup?'new-password':'current-password'}"></div>
  <button class="btn primary" style="width:100%" id="authBtn">${signup?'Crear cuenta':'Ingresar'}</button>
  <div class="authswitch">${signup?'¿Ya tenés cuenta?':'¿Primera vez?'} <button class="linkbtn" id="authSwitch">${signup?'Ingresar':'Crear cuenta'}</button></div></div></div>`;
  document.getElementById('authSwitch').onclick=()=>renderAuth(!signup);
  const button=document.getElementById('authBtn');
  button.onclick=async()=>{
    const emailValue=document.getElementById('email').value.trim();
    const passwordValue=document.getElementById('password').value;
    const aliasValue=signup?document.getElementById('name').value.trim():'';
    if(!emailValue||!passwordValue)return toast('Completá correo y contraseña');
    if(signup&&!aliasValue)return toast('Ingresá tu nombre o alias');
    if(passwordValue.length<6)return toast('La contraseña debe tener al menos 6 caracteres');
    const original=button.textContent;button.disabled=true;button.textContent=signup?'Creando…':'Ingresando…';
    try{
      let res;
      if(signup){
        const redirect=`${location.origin}${location.pathname}${pendingInviteToken?'?invite='+encodeURIComponent(pendingInviteToken):''}`;
        res=await sb.auth.signUp({email:emailValue,password:passwordValue,options:{data:{full_name:aliasValue},emailRedirectTo:redirect}});
      }else{
        res=await sb.auth.signInWithPassword({email:emailValue,password:passwordValue});
      }
      if(res.error)throw res.error;
      if(signup&&!res.data.session){
        toast('Cuenta creada. Revisá tu correo para confirmarla.');
        renderAuth(false);return;
      }
      session=res.data.session;
      if(pendingInviteToken)await redeemPendingInvite(aliasValue||userName());
      else await loadGroups();
    }catch(err){
      console.error(err);toast(err?.message||'No se pudo completar el acceso');
    }finally{
      if(document.getElementById('authBtn')){button.disabled=false;button.textContent=original}
    }
  };
}
async function redeemPendingInvite(alias=''){
  const token=pendingInviteToken||localStorage.getItem('pendingInviteToken');
  if(!token)return loadGroups();
  const {data,error}=await sb.rpc('redeem_group_invitation',{p_token:token,p_display_name:alias||userName()});
  if(error){
    toast(error.message);pendingInviteToken='';localStorage.removeItem('pendingInviteToken');history.replaceState({},'',location.pathname);return loadGroups();
  }
  pendingInviteToken='';localStorage.removeItem('pendingInviteToken');history.replaceState({},'',location.pathname);
  await loadGroups();
  if(data&&groups.some(g=>g.id===data))await openGroup(data);
}
async function loadGroups(){
  app.innerHTML='<div class="spinner">Cargando tus espacios…</div>';
  const {data,error}=await sb.from('memberships').select('*,groups(id,name,type,join_code,created_by)').eq('user_id',session.user.id).eq('active',true);
  if(error){toast(error.message);return}
  groups=(data||[]).map(x=>({...x.groups,membership:x}));
  renderGroups();
}
function renderGroups(){
  app.innerHTML=`<main><div class="pagehead"><div><h1>Tus espacios</h1><p>Cada espacio tiene sus propios administradores, accesos y porcentajes.</p></div><div class="actions"><button class="btn outline" id="joinBtn">Ingresar código</button><button class="btn primary" id="newGroup">+ Crear espacio</button><button class="btn soft" id="logout">Salir</button></div></div>
  <div class="workspace-grid">${groups.map(g=>{const owner=g.created_by===session.user.id;return `<div class="workspace card" data-group="${g.id}"><h3>${esc(g.name)}</h3><p>${g.type==='company'?'Empresa':'Grupo familiar'} · ${owner?'Administrador principal':g.membership.role==='admin'?'Administrador':'Solo consulta'} <span class="alias-chip">${esc(g.membership.display_name)}</span>${owner?'<span class="owner-chip">Titular</span>':''}</p></div>`}).join('')||'<div class="card workspace"><h3>No tenés espacios todavía</h3><p>Creá uno o ingresá un código de invitación.</p></div>'}</div></main>`;
  document.querySelectorAll('[data-group]').forEach(e=>e.onclick=()=>openGroup(e.dataset.group));
  document.getElementById('logout').onclick=()=>sb.auth.signOut();
  document.getElementById('newGroup').onclick=openCreateGroup;
  document.getElementById('joinBtn').onclick=openJoinGroup;
}
function openCreateGroup(){
  modal(`<h2>Crear espacio</h2><div class="sub">Casa, negocio u otro grupo independiente.</div>
  <div class="field"><label>Nombre</label><input id="gname" placeholder="Ej: Casa"></div>
  <div class="field"><label>Tipo</label><select id="gtype"><option value="family">Grupo familiar</option><option value="company">Empresa</option></select></div>
  <div class="modalactions"><button class="btn outline" data-close>Cancelar</button><button class="btn primary" id="saveGroup">Crear</button></div>`);
  document.getElementById('saveGroup').onclick=async()=>{const name=document.getElementById('gname').value.trim();if(!name)return toast('Ingresá un nombre');const {data,error}=await sb.rpc('create_group',{p_name:name,p_type:document.getElementById('gtype').value,p_owner_name:userName()});if(error)return toast(error.message);closeModal();await loadGroups();await openGroup(data)};
}
function openJoinGroup(){
  modal(`<h2>Ingresar con código</h2><div class="sub">Pegá el código de invitación que te envió el administrador.</div>
  <div class="field"><label>Código</label><input id="joinCode" maxlength="40" style="text-transform:uppercase"></div>
  <div class="field"><label>Tu alias en este espacio</label><input id="joinName" value="${esc(userName())}"></div>
  <div class="modalactions"><button class="btn outline" data-close>Cancelar</button><button class="btn primary" id="doJoin">Ingresar</button></div>`);
  document.getElementById('doJoin').onclick=async()=>{const token=document.getElementById('joinCode').value.trim();if(!token)return toast('Ingresá el código');const {data,error}=await sb.rpc('redeem_group_invitation',{p_token:token,p_display_name:document.getElementById('joinName').value.trim()});if(error)return toast(error.message);closeModal();await loadGroups();if(data)await openGroup(data)};
}
async function openGroup(id){
  group=groups.find(g=>g.id===id)||{id};
  membership=group.membership||null;
  app.innerHTML='<div class="spinner">Sincronizando información…</div>';
  await reloadGroup();
  renderApp();
}
async function reloadGroup(){
  const [m,s,o,p,c,d,g]=await Promise.all([
    sb.from('memberships').select('*').eq('group_id',group.id).eq('active',true).order('created_at'),

function obligationFor(serviceId,key){return obligations.find(o=>o.service_id===serviceId&&o.period===periodDate(key))}
function normalizeServiceName(value){
  return String(value||'')
    .trim()
    .toLocaleLowerCase('es-AR')
    .replace(/\s+/g,' ');
}
function frequencyLabel(service){
  if(service.frequency==='monthly')return 'Mensual';
  if(service.frequency==='plan')return 'Plan';
  return 'Puntual';
}
function planMonthNumbers(service){
  return Array.isArray(service.plan_months)
    ? service.plan_months.map(Number)
    : [];
}
function monthAppliesToService(service,key){
  if(service.frequency==='monthly')return true;
  if(service.frequency==='one_time')return true;
  if(service.frequency!=='plan')return true;

  const current=periodDate(key);
  const start=service.plan_start_month;
  const end=service.plan_end_month;
  const monthNumber=Number(key.split('-')[1]);

  if(!start||!end)return false;
  return current>=start
    && current<=end
    && planMonthNumbers(service).includes(monthNumber);
}
function servicePlanDescription(service){
  if(service.frequency!=='plan')return '';
  const months=planMonthNumbers(service);
  const short=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const selected=months.map(m=>short[m-1]).filter(Boolean).join(', ');
  const start=service.plan_start_month?monthLabel(service.plan_start_month.slice(0,7)):'—';
  const end=service.plan_end_month?monthLabel(service.plan_end_month.slice(0,7)):'—';
  return `${start} a ${end}${selected?' · '+selected:''}`;
}
function emptyBoxText(service){
  if(service.frequency==='one_time')return ['Sin movimiento','Cargar si corresponde'];
  return ['Sin datos','Cargar importe y vencimiento'];
}
function paymentFor(obligationId){return payments.find(p=>p.obligation_id===obligationId)}
function dueState(o){
  if(!o)return{cls:'missing',label:'Sin datos'};
  if(o.status==='paid'||paymentFor(o.id))return{cls:'paid',label:'Abonado'};
  const d=daysUntil(o.due_date);
  if(d===null)return{cls:'missing',label:'Falta vencimiento'};
  if(d<0)return{cls:'overdue',label:`Vencido hace ${Math.abs(d)} día${Math.abs(d)===1?'':'s'}`};
  if(d===0)return{cls:'urgent',label:'Vence hoy'};
  if(d<=2)return{cls:'urgent',label:`Faltan ${d} días`};
  if(d<=5)return{cls:'warning',label:`Faltan ${d} días`};
  if(d<=10)return{cls:'due-green-soft',label:`Faltan ${d} días`};
  return{cls:'due-green',label:`Faltan ${d} días`};
}
function boxClass(o){return dueState(o).cls}
function boxText(o,service){if(!o)return emptyBoxText(service);if(o.status==='paid'||paymentFor(o.id))return['Abonado',fmtMoney(paymentFor(o.id)?.total_amount||o.amount)];return[dueState(o).label,fmtMoney(o.amount)]}
function lastKnownAmount(serviceId,beforeKey){
  const limit=periodDate(beforeKey);
  return obligations.filter(o=>o.service_id===serviceId&&o.period<limit&&Number(o.amount)>0).sort((a,b)=>b.period.localeCompare(a.period))[0]?.amount||null;
}
function forecastMonth(key){
  let confirmed=0,estimated=0,missing=0;
  services.forEach(service=>{
    const obligation=obligationFor(service.id,key);
    if(obligation){
      if(!paymentFor(obligation.id)&&obligation.status!=='cancelled')confirmed+=Number(obligation.amount||0);
      return;
    }
    if(service.frequency==='one_time'||!monthAppliesToService(service,key))return;
    const previous=lastKnownAmount(service.id,key);
    if(previous)estimated+=Number(previous);else missing++;
  });
  return{key,confirmed,estimated,total:confirmed+estimated,missing};
}
function renderForecast(){

  const admins=members.filter(m=>m.role==='admin'&&Number(m.participation_percent)>0);

  return `<div class="forecast card"><h2>Gastos a afrontar</h2><p>Importes confirmados más una estimación basada en el último valor cargado. Los estimados se muestran separados.</p><div class="forecast-grid">${months.map(key=>{const f=forecastMonth(key);return `<div class="forecast-month"><h3>${monthLabel(key)}</h3><div class="forecast-total">${fmtMoney(f.total)}</div><div class="forecast-detail"><span class="confirmed">Confirmado ${fmtMoney(f.confirmed)}</span> · <span class="estimate">Estimado ${fmtMoney(f.estimated)}</span>${f.missing?` · ${f.missing} sin referencia`:''}</div><div class="forecast-shares">${admins.map(a=>`<div class="forecast-share"><span>${esc(a.display_name)} (${Number(a.participation_percent)}%)</span><strong>${fmtMoney(f.total*Number(a.participation_percent)/totalShares)}</strong></div>`).join('')||'<div class="forecast-detail">Configurá porcentajes entre administradores.</div>'}</div></div>`}).join('')}</div></div>`;
}

function balanceData(){
  const rows=members.filter(m=>m.role==='admin'&&Number(m.participation_percent)>0).map(m=>({m,owed:0,paid:0,balance:0}));
  payments.forEach(p=>{const o=obligations.find(x=>x.id===p.obligation_id);if(!o)return;const amount=Number(p.total_amount||0),sumShares=rows.reduce((a,r)=>a+Number(r.m.participation_percent||0),0)||100;rows.forEach(r=>r.owed+=amount*Number(r.m.participation_percent||0)/sumShares);contributions.filter(c=>c.payment_id===p.id).forEach(c=>{const r=rows.find(x=>x.m.id===c.membership_id);if(r)r.paid+=Number(c.amount||0)})});
  rows.forEach(r=>r.balance=r.paid-r.owed);return rows;
}
function renderBalance(){const rows=balanceData();return `<div class="balance card"><h2>Equilibrio acumulado</h2><p>Compara lo que correspondía pagar con lo efectivamente aportado.</p><div class="balancegrid">${rows.map(r=>`<div class="person"><strong>${esc(r.m.display_name)}</strong><div class="money ${r.balance>1?'positive':r.balance<-1?'negative':'neutral'}">${r.balance>=0?'+':''}${fmtMoney(r.balance)}</div><small>Correspondía ${fmtMoney(r.owed)} · Pagó ${fmtMoney(r.paid)}</small></div>`).join('')||'<div class="person">Definí los porcentajes de los administradores.</div>'}</div></div>`}
function reportMonthData(key){
  const monthObligations=obligations.filter(o=>o.period===periodDate(key)&&o.status!=='cancelled');
  const total=monthObligations.reduce((sum,o)=>sum+Number(o.amount||0),0);
  const paid=monthObligations.reduce((sum,o)=>{
    const payment=paymentFor(o.id);
    return sum+Number(payment?.total_amount||0);
  },0);
  return{key,total,paid,pending:Math.max(0,total-paid)};
}
function reportCategoryData(){

    totals.set(label,(totals.get(label)||0)+Number(o.amount||0));
  });

function reportServiceData(){

    const name=document.getElementById('sname').value.trim();

    const duplicate=services.some(service=>
      normalizeServiceName(service.name)===normalizeServiceName(name)
    );
    if(duplicate)return toast('Ya existe un servicio con ese nombre en este espacio');

    const frequencyValue=frequency.value;
    const payload={
      group_id:group.id,
      name,
      category:document.getElementById('scat').value,
      frequency:frequencyValue,
      created_by:session.user.id,
      plan_start_month:null,
      plan_end_month:null,
      plan_months:null
    };

    if(frequencyValue==='plan'){
      const startValue=document.getElementById('planStart').value;
      const endValue=document.getElementById('planEnd').value;
      const selected=[...document.querySelectorAll('[data-plan-month]:checked')]
        .map(input=>Number(input.dataset.planMonth));

      if(!startValue||!endValue)return toast('Completá el inicio y el final del plan');
      if(endValue<startValue)return toast('El final del plan no puede ser anterior al inicio');
      if(!selected.length)return toast('Elegí al menos un mes de pago');

      payload.plan_start_month=periodDate(startValue);
      payload.plan_end_month=periodDate(endValue);
      payload.plan_months=selected;
    }

    const original=saveButton.textContent;
    saveButton.disabled=true;
    saveButton.textContent='Guardando…';

    try{
      const {error}=await sb.from('services').insert(payload);
      if(error)throw error;
      closeModal();
      await reloadGroup();
      renderApp();
      toast(frequencyValue==='plan'?'Plan agregado':'Servicio agregado');
    }catch(err){
      console.error('Error guardando servicio:',err);
      const message=String(err?.message||'');
      if(message.includes('invalid input value for enum')||message.includes('plan_start_month')){
        toast('Falta ejecutar la actualización SQL para habilitar Plan');
      }else if(message.includes('Ya existe un servicio')||message.includes('duplicate key')||message.includes('23505')){
        toast('Ya existe un servicio con ese nombre en este espacio');
      }else{
        toast(message||'No se pudo guardar');
      }
    }finally{
      if(document.getElementById('saveService')){
        saveButton.disabled=false;
        saveButton.textContent=original;
      }
    }
  };
}
function openObligation(serviceId,key){

    : [];

  modal(`<h2>${esc(s.name)} · ${monthLabel(key)}</h2>
  <div class="sub">${o?'Editá los datos o agregá documentación.':'Cargá el importe, el vencimiento y la factura en un solo paso.'}</div>

  <div class="grid2">
    <div class="field">

  <div class="field">
    <label>Factura o boleta <span style="font-weight:400;text-transform:none">(opcional)</span></label>
    <input id="invoiceFile" type="file" accept="image/jpeg,image/png,image/webp,application/pdf" ${!canEdit()?'disabled':''}>

  </div>

  ${existingInvoices.length?`
    <div class="field">
      <label>Facturas guardadas</label>
      <div class="docs">
        ${existingInvoices.map((d,i)=>`<button type="button" class="btn soft small" data-existing-invoice="${d.file_path}">Factura ${i+1}</button>`).join('')}
      </div>
    </div>`:''}

  <div class="field">
    <label>Notas</label>
    <textarea id="onotes" ${!canEdit()?'disabled':''}>${esc(o?.notes||'')}</textarea>
  </div>

  ${p?`<div class="notice">Abonado el ${fmtDate(p.paid_at)} por ${fmtMoney(p.total_amount)}</div>`:''}

  <div class="modalactions">
    <button class="btn outline" data-close>Cerrar</button>
    ${canEdit()?`
      <button class="btn soft" id="saveObligation">${o?'Guardar cambios':'Guardar factura'}</button>
      ${o&&!p?'<button class="btn primary" id="markPaid">Marcar abonado</button>':''}
    `:''}
  </div>`);

  document.querySelectorAll('[data-existing-invoice]').forEach(btn=>{
    btn.onclick=async()=>{
      const {data,error}=await sb.storage.from('documents').createSignedUrl(btn.dataset.existingInvoice,120);
      if(error)return toast(error.message);
      window.open(data.signedUrl,'_blank');
    };
  });

  if(!canEdit())return;

  const saveButton=document.getElementById('saveObligation');
  saveButton.onclick=async()=>{
    const amountValue=document.getElementById('oamount').value;
    const dueValue=document.getElementById('odue').value;
    const file=document.getElementById('invoiceFile').files[0];

    if(!amountValue||!dueValue)return toast('Completá importe y vencimiento');
    if(Number(amountValue)<0)return toast('El importe no puede ser negativo');
    if(file&&file.size>10*1024*1024)return toast('La factura supera el límite de 10 MB');

    const originalText=saveButton.textContent;
    saveButton.disabled=true;
    saveButton.textContent=file?'Guardando y subiendo…':'Guardando…';

    try{
      const period=periodDate(key);
      const payload={
        service_id:serviceId,
        period,
        amount:Number(amountValue),
        due_date:dueValue,
        status:p?'paid':'pending',
        notes:document.getElementById('onotes').value,
        created_by:session.user.id
      };

      const {data:saved,error}=await sb
        .from('obligations')
        .upsert(payload,{onConflict:'service_id,period'})
        .select()
        .single();

      if(error)throw error;

      if(file){
        await uploadDoc(file,serviceId,saved.id,null,'invoice');
      }

      closeModal();
      await reloadGroup();
      renderApp();
      toast(file?'Factura y datos guardados':'Datos guardados');
    }catch(err){
      console.error('Error guardando obligación:',err);
      toast(err?.message||'No se pudo guardar');
    }finally{
      if(document.getElementById('saveObligation')){
        saveButton.disabled=false;
        saveButton.textContent=originalText;
      }
    }
  };

  if(o&&!p){
    document.getElementById('markPaid').onclick=()=>openPayModal(o);
  }
}

async function uploadDoc(file,serviceId,obligationId,paymentId,kind){
  const allowed=['image/jpeg','image/png','image/webp','application/pdf'];
  if(!allowed.includes(file.type))throw new Error('Formato de archivo no admitido');
  if(file.size>10*1024*1024)throw new Error('El archivo supera el límite de 10 MB');

  const safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const filePath=`${group.id}/${serviceId}/${Date.now()}_${Math.random().toString(36).slice(2,8)}_${safe}`;

  const {error:uploadError}=await sb.storage
    .from('documents')
    .upload(filePath,file,{
      contentType:file.type,
      upsert:false,
      cacheControl:'3600'
    });

  if(uploadError)throw uploadError;

  const {error:documentError}=await sb.from('documents').insert({
    group_id:group.id,
    obligation_id:obligationId,
    payment_id:paymentId,
    kind,
    file_path:filePath,
    original_name:file.name,
    mime_type:file.type,
    size_bytes:file.size,
    uploaded_by:session.user.id
  });

  if(documentError){
    await sb.storage.from('documents').remove([filePath]);
    throw documentError;
  }

  return filePath;
}
function openPayModal(o){
  const active=members.filter(m=>Number(m.participation_percent)>0);
  const defaults={};let left=Number(o.amount||0);active.forEach((m,i)=>{const v=i===active.length-1?left:Math.round(Number(o.amount||0)*Number(m.participation_percent||0)/100);defaults[m.id]=v;left-=v});
  modal(`<h2>Registrar pago</h2><div class="sub">Indicá cuánto aportó realmente cada integrante.</div><div class="grid2"><div class="field"><label>Fecha</label><input id="paidDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div class="field"><label>Total pagado</label><input id="paidTotal" type="number" value="${o.amount||0}"></div></div>
  ${active.map(m=>`<div class="field"><label>${esc(m.display_name)} aportó</label><input type="number" data-contrib="${m.id}" value="${defaults[m.id]||0}"></div>`).join('')}
  <div class="field"><label>Comprobante</label><input id="receiptFile" type="file" accept="image/*,application/pdf"></div>
  <div class="modalactions"><button class="btn outline" data-close>Cancelar</button><button class="btn primary" id="savePay">Registrar pago</button></div>`);
  savePay.onclick=async()=>{const vals=[...document.querySelectorAll('[data-contrib]')].map(x=>({membership_id:x.dataset.contrib,amount:Number(x.value||0)})),sum=vals.reduce((a,x)=>a+x.amount,0),total=Number(paidTotal.value||0);if(Math.abs(sum-total)>.01)return toast('Los aportes deben sumar el total pagado');const {data:p,error}=await sb.from('payments').insert({obligation_id:o.id,paid_at:paidDate.value,total_amount:total,created_by:session.user.id}).select().single();if(error)return toast(error.message);const c=await sb.from('payment_contributions').insert(vals.map(x=>({...x,payment_id:p.id})));if(c.error)return toast(c.error.message);await sb.from('obligations').update({status:'paid'}).eq('id',o.id);if(receiptFile.files[0])await uploadDoc(receiptFile.files[0],o.service_id,o.id,p.id,'receipt');closeModal();await reloadGroup();renderApp();toast('Pago registrado')};
}

async function deleteService(serviceId){
  const service=services.find(s=>s.id===serviceId);
  if(!service)return;

  const serviceObligations=obligations.filter(o=>o.service_id===serviceId);
  const obligationIds=serviceObligations.map(o=>o.id);
  const servicePayments=payments.filter(p=>obligationIds.includes(p.obligation_id));
  const paymentIds=servicePayments.map(p=>p.id);
  const serviceDocs=documents.filter(d=>
    obligationIds.includes(d.obligation_id)
    || paymentIds.includes(d.payment_id)
  );

  const warning=serviceObligations.length
    ? `¿Eliminar "${service.name}"? Se borrarán también ${serviceObligations.length} movimiento(s), pagos, facturas y comprobantes. Esta acción no se puede deshacer.`
    : `¿Eliminar "${service.name}"? Esta acción no se puede deshacer.`;

  if(!confirm(warning))return;

  try{
    const paths=serviceDocs.map(d=>d.file_path).filter(Boolean);
    if(paths.length){
      const {error:storageError}=await sb.storage.from('documents').remove(paths);
      if(storageError)throw storageError;
    }

    const {error}=await sb.from('services').delete().eq('id',serviceId);
    if(error)throw error;

    closeModal();
    await reloadGroup();
    renderApp();
    toast('Servicio eliminado');
  }catch(err){
    console.error('Error eliminando servicio:',err);
    toast(err?.message||'No se pudo eliminar el servicio');
  }
}
function openPaymentDetail(id){const p=payments.find(x=>x.id===id),o=obligations.find(x=>x.id===p.obligation_id),s=services.find(x=>x.id===o.service_id),cs=contributions.filter(x=>x.payment_id===id);modal(`<h2>${esc(s.name)}</h2><div class="sub">${monthLabel(o.period.slice(0,7))}</div><div class="notice">Pagado ${fmtDate(p.paid_at)} · ${fmtMoney(p.total_amount)}</div>${cs.map(c=>`<div class="row"><span>${esc(members.find(m=>m.id===c.membership_id)?.display_name||'Integrante')}</span><strong>${fmtMoney(c.amount)}</strong></div>`).join('')}<div class="modalactions"><button class="btn outline" data-close>Cerrar</button><button class="btn soft" id="openFolderBtn">Abrir carpeta</button></div>`);openFolderBtn.onclick=()=>openFolder(s.id)}
function openMembers(){
  if(!canManageAccess())return toast('Solo el administrador principal puede gestionar accesos');

  modal(`<h2>Accesos de ${esc(group.name)}</h2>
    <div class="sub">Solo el administrador principal puede invitar personas, cambiar permisos o habilitar Reportes. Los administradores operativos pueden cargar y pagar, pero no conceder accesos.</div>

    <div style="margin-bottom:14px"><button class="btn primary" id="invitePersonBtn">+ Invitar persona</button></div>

    ${members.map(member=>{
      const ownerMember=member.user_id===group.created_by;
      return `<div class="access-grid">
        <div>
          <input data-member-name="${member.id}" type="text" value="${esc(member.display_name)}" style="width:100%;border:1px solid var(--line);border-radius:10px;padding:9px">
          <small class="access-note">${ownerMember?'Administrador principal':member.user_id===session.user.id?'Tu alias':'Alias dentro de este espacio'}</small>
        </div>

        <select data-role="${member.id}" ${ownerMember?'disabled':''}>
          <option value="admin" ${member.role==='admin'?'selected':''}>Administrador</option>
          <option value="viewer" ${member.role==='viewer'?'selected':''}>Solo consulta</option>
        </select>

        <input data-share="${member.id}" type="number" min="0" max="100" step="0.01" value="${member.role==='admin'?member.participation_percent:0}" ${member.role==='viewer'?'disabled':''} title="Porcentaje de gastos">

        <label class="access-check">
          <input type="checkbox" data-report-access="${member.id}" ${ownerMember||member.can_view_reports?'checked':''} ${ownerMember?'disabled':''}>
          Reportes
        </label>

        ${ownerMember?'<span class="owner-chip">Titular</span>':`<button class="btn danger small" data-revoke-member="${member.id}">Quitar</button>`}
      </div>`;
    }).join('')}

    <div class="notice">Los porcentajes de quienes participan en los gastos deben sumar 100%. El permiso Reportes es independiente: podés dárselo a un administrador o a una persona de solo consulta.</div>

    <div class="modalactions">
      <button class="btn outline" data-close>Cerrar</button>
      <button class="btn primary" id="saveMembers">Guardar</button>
    </div>`,true);

  document.getElementById('invitePersonBtn').onclick=openInviteModal;
  document.querySelectorAll('[data-role]').forEach(select=>{
    select.onchange=()=>{
      const input=document.querySelector(`[data-share="${select.dataset.role}"]`);
      if(select.value==='viewer'){
        input.value=0;
        input.disabled=true;
      }else input.disabled=false;
    };
  });
  document.querySelectorAll('[data-revoke-member]').forEach(button=>{
    button.onclick=()=>revokeMemberAccess(button.dataset.revokeMember);
  });

  document.getElementById('saveMembers').onclick=async()=>{
    const updates=members.map(member=>{
      const ownerMember=member.user_id===group.created_by;
      const role=ownerMember?'admin':document.querySelector(`[data-role="${member.id}"]`).value;
      return{
        id:member.id,
        display_name:document.querySelector(`[data-member-name="${member.id}"]`).value.trim(),
        role,
        participation_percent:role==='admin'?Number(document.querySelector(`[data-share="${member.id}"]`).value||0):0,
        can_view_reports:ownerMember||document.querySelector(`[data-report-access="${member.id}"]`).checked
      };
    });

    if(updates.some(item=>!item.display_name))return toast('Todos deben tener un alias');
    const admins=updates.filter(item=>item.role==='admin');
    if(Math.abs(admins.reduce((sum,item)=>sum+item.participation_percent,0)-100)>.01){
      return toast('Los porcentajes de los administradores deben sumar 100%');
    }

    const button=document.getElementById('saveMembers');
    const original=button.textContent;button.disabled=true;button.textContent='Guardando…';
    try{
      const {error}=await sb.rpc('owner_update_group_members',{p_group_id:group.id,p_members:updates});
      if(error)throw error;
      closeModal();await reloadGroup();renderApp();toast('Accesos actualizados');
    }catch(err){
      console.error(err);toast(err?.message||'No se pudieron guardar los accesos');
    }finally{
      if(document.getElementById('saveMembers')){button.disabled=false;button.textContent=original}
    }
  };
}
async function revokeMemberAccess(membershipId){
  const member=members.find(item=>item.id===membershipId);
  if(!member)return;
  if(!confirm(`¿Quitar el acceso de ${member.display_name} a ${group.name}? Su historial de aportes se conservará.`))return;
  const {error}=await sb.rpc('owner_revoke_member',{p_group_id:group.id,p_membership_id:membershipId});
  if(error)return toast(error.message);
  closeModal();await reloadGroup();renderApp();toast('Acceso revocado');
}

async function copyText(text,message){try{await navigator.clipboard.writeText(text);toast(message)}catch{const area=document.createElement('textarea');area.value=text;document.body.appendChild(area);area.select();document.execCommand('copy');area.remove();toast(message)}}
window.addEventListener('unhandledrejection',event=>{console.error(event.reason);toast(event.reason?.message||'Ocurrió un error')});
